name: Build LuCI App TorrServer Companion

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version, e.g. 1.1112'
        required: true
        default: '1.1112'

jobs:
  release:
    name: Build and Release luci-app-torrserver
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      PKG_NAME: luci-app-torrserver
      PKG_ARCH: all

    steps:
      - name: Resolve package metadata
        shell: bash
        run: |
          set -euxo pipefail

          PKG_VERSION="${{ github.event.inputs.version }}"
          RELEASE_TAG="v${PKG_VERSION}"
          RELEASE_NAME="LuCI App TorrServer ${PKG_VERSION}"

          {
            echo "PKG_VERSION=${PKG_VERSION}"
            echo "RELEASE_TAG=${RELEASE_TAG}"
            echo "RELEASE_NAME=${RELEASE_NAME}"
          } >> "${GITHUB_ENV}"

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install packaging tools
        shell: bash
        run: |
          set -euxo pipefail

          sudo apt-get update
          sudo apt-get install -y curl tar xz-utils dos2unix

          NFPM_VER="2.43.1"
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VER}/nfpm_${NFPM_VER}_Linux_x86_64.tar.gz" | tar -xz
          sudo install -m 0755 nfpm /usr/local/bin/nfpm

      - name: Generate LuCI app files
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p \
            root/usr/lib/lua/luci/controller \
            root/usr/lib/lua/luci/model/cbi \
            packaging

          cat > root/usr/lib/lua/luci/controller/torrserver.lua <<'EOF'
          module("luci.controller.torrserver", package.seeall)

          function index()
              if not nixio.fs.access("/etc/config/torrserver") then return end
              entry({"admin", "services", "torrserver"}, cbi("torrserver"), _("TorrServer"), 60)

              entry({"admin", "services", "torrserver", "status"}, call("action_status")).leaf = true
              entry({"admin", "services", "torrserver", "start"}, call("action_start")).leaf = true
              entry({"admin", "services", "torrserver", "stop"}, call("action_stop")).leaf = true
              entry({"admin", "services", "torrserver", "restart"}, call("action_restart")).leaf = true
              entry({"admin", "services", "torrserver", "get_log"}, call("action_log")).leaf = true
          end

          function action_start()
              luci.sys.call("/etc/init.d/torrserver start")
              nixio.nanosleep(1)
              luci.http.status(200, "OK")
          end

          function action_stop()
              luci.sys.call("/etc/init.d/torrserver stop")
              nixio.nanosleep(1)
              luci.http.status(200, "OK")
          end

          function action_restart()
              luci.sys.call("/etc/init.d/torrserver restart")
              nixio.nanosleep(2)
              luci.http.status(200, "OK")
          end

          function action_log()
              local sys = require "luci.sys"
              local http = require "luci.http"

              local log = sys.exec("logread -e 'torrserver' | tail -n 200")

              if not log or #log == 0 then
                  log = "Лог пуст. Возможно, сервис молчит или сообщения были вытеснены другими системными событиями."
              end

              http.prepare_content("text/plain")
              http.write(log)
          end

          function action_status()
              local sys = require "luci.sys"
              local http = require "luci.http"
              local json = require "luci.jsonc"

              local pid = sys.exec("pidof torrserver | awk '{print $1}'"):gsub("\n", "")

              local data = {
                  running = false,
                  ts_cpu = 0,
                  mem_kb = 0,
                  sys_mem = { total = 0, free = 0, available = 0 },
                  cores = { 0, 0, 0, 0 }
              }

              if pid and #pid > 0 then
                  if sys.call("test -d /proc/" .. pid) == 0 then
                      data.running = true
                  else
                      pid = nil
                  end
              end

              for line in io.lines("/proc/meminfo") do
                  local k, v = line:match("([^:]+):%s+(%d+)")
                  if k == "MemTotal" then data.sys_mem.total = tonumber(v) end
                  if k == "MemFree" then data.sys_mem.free = tonumber(v) end
                  if k == "MemAvailable" then data.sys_mem.available = tonumber(v) end
              end

              if not data.sys_mem.available or data.sys_mem.available == 0 then
                  data.sys_mem.available = data.sys_mem.free
              end

              local cur_sys = {}
              for line in io.lines("/proc/stat") do
                  local key, u, n, s, i = line:match("^(cpu%d*)%s+(%d+)%s+(%d+)%s+(%d+)%s+(%d+)")
                  if key then
                      cur_sys[key] = {
                          total = tonumber(u) + tonumber(n) + tonumber(s) + tonumber(i),
                          work  = tonumber(u) + tonumber(n) + tonumber(s)
                      }
                  end
              end

              local cur_proc_total = 0
              if pid then
                  local rss = sys.exec("grep VmRSS /proc/" .. pid .. "/status 2>/dev/null | awk '{print $2}'"):gsub("\n", "")
                  data.mem_kb = tonumber(rss) or 0

                  local f = io.open("/proc/" .. pid .. "/stat", "r")
                  if f then
                      local content = f:read()
                      f:close()
                      local parts = {}
                      for part in content:gmatch("%S+") do table.insert(parts, part) end
                      cur_proc_total = (tonumber(parts[14]) or 0) + (tonumber(parts[15]) or 0)
                  end
              end

              local state_file = "/tmp/ts_monitor_state.json"
              local prev_state = {}
              local f = io.open(state_file, "r")
              if f then
                  prev_state = json.parse(f:read("*all")) or {}
                  f:close()
              end

              for i = 0, 3 do
                  local k = "cpu" .. i
                  if cur_sys[k] and prev_state[k] then
                      local d_total = cur_sys[k].total - prev_state[k].total
                      local d_work  = cur_sys[k].work - prev_state[k].work
                      if d_total > 0 then
                          data.cores[i + 1] = tonumber(string.format("%.1f", (d_work / d_total) * 100))
                      end
                  end
              end

              if cur_sys["cpu"] and prev_state["cpu"] and cur_proc_total > 0 and prev_state["proc"] then
                  local d_sys_total = cur_sys["cpu"].total - prev_state["cpu"].total
                  local d_proc = cur_proc_total - prev_state["proc"]
                  if d_sys_total > 0 then
                      local cpu_count = 0
                      while cur_sys["cpu" .. cpu_count] do cpu_count = cpu_count + 1 end
                      if cpu_count < 1 then cpu_count = 1 end
                      data.ts_cpu = string.format("%.1f", (d_proc / d_sys_total) * 100 * cpu_count)
                  end
              end

              local new_state = cur_sys
              new_state["proc"] = cur_proc_total
              f = io.open(state_file, "w")
              if f then
                  f:write(json.stringify(new_state))
                  f:close()
              end

              http.prepare_content("application/json")
              http.write_json(data)
          end
          EOF

          cat > root/usr/lib/lua/luci/model/cbi/torrserver.lua <<'EOF'
          m = Map("torrserver", translate("TorrServer"), translate("Панель управления"))

          local uci = require "luci.model.uci".cursor()
          local sys = require "luci.sys"
          local dsp = require "luci.dispatcher"

          local function safe_num_port(v)
              local p = tonumber(v)
              if not p or p < 1 or p > 65535 then
                  return "8090"
              end
              return tostring(math.floor(p))
          end

          local function safe_host(v)
              v = tostring(v or "")
              if v:match("^[%w%._:%-%[%]]+$") then
                  return v
              end
              return "192.168.1.1"
          end

          local function jsq(s)
              s = tostring(s or "")
              s = s:gsub('\\', '\\\\')
                   :gsub("'", "\\'")
                   :gsub('"', '\\"')
                   :gsub("\n", "")
                   :gsub("\r", "")
                   :gsub("</", "<\\/")
              return s
          end

          local port = safe_num_port(uci:get("torrserver", "main", "port") or "8090")
          local lan_ip = safe_host(sys.exec("uci -q get network.lan.ipaddr"):gsub("\n", ""))
          local url = "http://" .. lan_ip .. ":" .. port

          local url_status = dsp.build_url("admin", "services", "torrserver", "status")
          local url_start = dsp.build_url("admin", "services", "torrserver", "start")
          local url_stop = dsp.build_url("admin", "services", "torrserver", "stop")
          local url_restart = dsp.build_url("admin", "services", "torrserver", "restart")
          local url_log = dsp.build_url("admin", "services", "torrserver", "get_log")

          s = m:section(NamedSection, "main", "torrserver", translate("Мониторинг ресурсов"))
          s.anonymous = true

          local html_view = [[
          <style>
              .ts-wrap { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; align-items: stretch; }
              .ts-card {
                  background: #fff; border: 1px solid #ddd; border-radius: 4px;
                  padding: 12px; width: 160px; text-align: center; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
                  display: flex; flex-direction: column; justify-content: space-between;
              }
              .ts-card.wide { width: 220px; }
              .ts-head { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }
              .ts-val-big { font-size: 22px; font-weight: bold; color: #333; line-height: 1.2; }
              .ts-unit { font-size: 12px; color: #999; font-weight: normal; }
              .ts-sub { font-size: 11px; color: #666; margin-top: 4px; }
              .mem-bar-bg { background: #eee; height: 6px; border-radius: 3px; overflow: hidden; margin: 8px 0 4px 0; }
              .mem-bar-fill { background: #2196F3; height: 100%; width: 0%; transition: width 0.5s ease-in-out; }
              .cores-grid { display: flex; gap: 6px; height: 80px; align-items: flex-end; justify-content: center; margin-top: 5px; }
              .core-col { width: 22px; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
              .core-track {
                  width: 100%; height: 65px; background: #f0f0f0;
                  position: relative; border-radius: 3px; overflow: hidden;
                  border: 1px solid #e0e0e0;
                  display: flex; flex-direction: column-reverse;
              }
              .core-fill {
                  width: 100%; background: #4caf50; height: 0%;
                  transition: height 0.4s ease-out; min-height: 0px;
              }
              .core-num { font-size: 10px; color: #999; margin-top: 4px; font-weight: bold; }
              .ctrl-panel { margin-top: 15px; display: flex; justify-content: space-between; gap: 8px; width: 100%; }
              .btn-action { flex: 1; padding: 8px 0; border: none; border-radius: 4px; color: #fff; cursor: pointer; font-size: 11px; font-weight: bold; text-transform: uppercase; transition: opacity 0.2s; text-align: center; }
              .btn-action:hover { opacity: 0.9; }
              .btn-start { background-color: #4caf50; }
              .btn-stop { background-color: #f44336; }
              .btn-restart { background-color: #ff9800; }
              .btn-disabled { background-color: #ccc !important; cursor: wait; }
          </style>

          <div class="ts-wrap">
              <div class="ts-card">
                  <div class="ts-head">Сервис</div>
                  <div id="ts_status" class="ts-val-big" style="font-size: 16px;">...</div>
                  <div class="ctrl-panel" id="ctrl_panel"></div>
              </div>

              <div class="ts-card wide">
                  <div class="ts-head">Оперативная Память</div>
                  <div><span id="ts_mem" class="ts-val-big">0</span> <span class="ts-unit">MB (TorrServer)</span></div>
                  <div class="mem-bar-bg"><div id="mem_bar" class="mem-bar-fill" style="width:0%"></div></div>
                  <div class="ts-sub" id="mem_details">Free: 0 MB | Total: 0 MB</div>
              </div>

              <div class="ts-card">
                  <div class="ts-head">Процессор (TS)</div>
                  <div class="ts-val-big"><span id="ts_cpu">0</span><span class="ts-unit">%</span></div>
                  <div class="ts-sub">Нагрузка от процесса</div>
              </div>

              <div class="ts-card">
                  <div class="ts-head">Ядра (System)</div>
                  <div class="cores-grid">
                      <div class="core-col"><div class="core-track"><div id="c0" class="core-fill" style="height:0%"></div></div><div class="core-num">0</div></div>
                      <div class="core-col"><div class="core-track"><div id="c1" class="core-fill" style="height:0%"></div></div><div class="core-num">1</div></div>
                      <div class="core-col"><div class="core-track"><div id="c2" class="core-fill" style="height:0%"></div></div><div class="core-num">2</div></div>
                      <div class="core-col"><div class="core-track"><div id="c3" class="core-fill" style="height:0%"></div></div><div class="core-num">3</div></div>
                  </div>
                  <div id="cores_txt" class="ts-sub" style="margin-top:5px; font-size:9px;">0% | 0% | 0% | 0%</div>
              </div>
          </div>

          <script type="text/javascript">
              var u_stat = ']] .. jsq(url_status) .. [[';
              var u_start = ']] .. jsq(url_start) .. [[';
              var u_stop = ']] .. jsq(url_stop) .. [[';
              var u_restart = ']] .. jsq(url_restart) .. [[';

              function setBarHeight(id, pct) {
                  var el = document.getElementById(id);
                  if (el) {
                      var h = Math.round(pct);
                      if (h < 0) h = 0;
                      if (h > 100) h = 100;
                      el.setAttribute('style', 'height:' + h + '% !important; background-color:' + getColor(h));
                  }
              }

              function getColor(pct) {
                  if (pct > 80) return '#f44336';
                  if (pct > 50) return '#ff9800';
                  return '#4caf50';
              }

              function renderButtons(running) {
                  var p = document.getElementById('ctrl_panel');
                  if (!p) return;
                  var isStuck = p.querySelector('.btn-disabled') ? true : false;
                  var needsUpdate = false;
                  if (running) { if (!document.getElementById('btn_stop') || isStuck) needsUpdate = true; }
                  else { if (!document.getElementById('btn_start') || isStuck) needsUpdate = true; }

                  if (needsUpdate) {
                      var htmlStart = '<button type="button" id="btn_start" class="btn-action btn-start" onclick="srv(\'start\')">Start</button>';
                      var htmlRun = '<button type="button" id="btn_stop" class="btn-action btn-stop" onclick="srv(\'stop\')">Stop</button>' +
                                    '<button type="button" id="btn_restart" class="btn-action btn-restart" onclick="srv(\'restart\')">Restart</button>';
                      p.innerHTML = running ? htmlRun : htmlStart;
                  }
              }

              function srv(action) {
                  var url = (action == 'start') ? u_start : (action == 'stop') ? u_stop : u_restart;
                  var btn = document.getElementById('btn_' + action);
                  if (btn) { btn.innerText = '...'; btn.classList.add('btn-disabled'); }
                  var xhr = new XMLHttpRequest();
                  xhr.open('GET', url, true);
                  xhr.onload = function() { setTimeout(forceUpdate, 1000); };
                  xhr.send();
              }

              function forceUpdate() { XHR.get(u_stat, null, function(x, data) { updateUI(x, data); }); }

              function updateUI(x, data) {
                  if (!data) return;
                  var st = document.getElementById('ts_status');
                  if (data.running) {
                      if (st) st.innerHTML = '<span style="color:#4caf50">ЗАПУЩЕН</span>';
                      renderButtons(true);
                  } else {
                      if (st) st.innerHTML = '<span style="color:#f44336">ОСТАНОВЛЕН</span>';
                      renderButtons(false);
                      document.getElementById('ts_mem').innerText = '0';
                      document.getElementById('ts_cpu').innerText = '0';
                      document.getElementById('mem_bar').style.width = '0%';
                  }
                  if (data.running) {
                      var memMb = (data.mem_kb / 1024).toFixed(1);
                      document.getElementById('ts_mem').innerText = memMb;
                  }
                  if (data.sys_mem && data.sys_mem.total > 0) {
                      var freeMb = (data.sys_mem.available / 1024).toFixed(0);
                      var totalMb = (data.sys_mem.total / 1024).toFixed(0);
                      document.getElementById('mem_details').innerText = 'Free: ' + freeMb + ' MB | Total: ' + totalMb + ' MB';
                      if (data.running) {
                          var pct = (data.mem_kb / data.sys_mem.total) * 100;
                          document.getElementById('mem_bar').style.width = Math.max(pct, 1) + '%';
                      }
                  }
                  if (data.running) document.getElementById('ts_cpu').innerText = data.ts_cpu;
                  var txt = [];
                  if (data.cores) {
                      for (var i = 0; i < 4; i++) {
                          var val = parseFloat(data.cores[i]) || 0;
                          setBarHeight('c' + i, val);
                          txt.push(Math.round(val) + '%');
                      }
                  }
                  document.getElementById('cores_txt').innerText = txt.join(' | ');
              }

              XHR.poll(3, u_stat, null, updateUI);
          </script>
          ]]

          st = s:option(DummyValue, "_monitor")
          st.rawhtml = true
          st.value = html_view

          conf = m:section(NamedSection, "main", "torrserver", translate("Настройки"))
          conf.anonymous = true
          conf:tab("basic", translate("Основные"))
          conf:tab("advanced", translate("Дополнительные настройки"))

          local btn_html = '<input type="button" class="cbi-button cbi-button-apply" value="Открыть TorrServer Web UI" onclick="window.open(\'' .. jsq(url) .. '\', \'_blank\')" />'
          btn = conf:taboption("basic", DummyValue, "_webui", translate("Веб-интерфейс"))
          btn.rawhtml = true
          btn.value = btn_html

          e = conf:taboption("basic", Flag, "enabled", translate("Автозапуск"))
          e.rmempty = false

          e = conf:taboption("basic", Value, "port", translate("Порт веб-интерфейса"))
          e.datatype = "port"
          e.default = "8090"

          e = conf:taboption("basic", Value, "path", translate("Рабочая директория"))
          e.placeholder = "/opt/torrserver"

          e = conf:taboption("basic", ListValue, "proxymode", translate("Режим прокси"))
          e:value("tracker", "tracker")
          e:value("all", "all")
          e:value("off", "off")
          e.default = "tracker"

          log_btn = conf:taboption("basic", DummyValue, "_log_btn", translate("Журнал"))
          log_btn.rawhtml = true
          log_btn.value = [[<button type="button" class="cbi-button cbi-button-neutral" onclick="toggleLog(event)">Просмотр журнала (LOG)</button>]]

          adv = conf:taboption("advanced", Value, "ip", translate("IP для bind"))
          adv.placeholder = "0.0.0.0"
          adv.datatype = "ipaddr"
          adv.optional = true

          adv = conf:taboption("advanced", Flag, "dontkill", translate("Не завершать по обычному stop-сигналу (--dontkill)"))
          adv.rmempty = false
          adv.default = "1"

          adv = conf:taboption("advanced", Flag, "httpauth", translate("Включить HTTP auth"))
          adv.rmempty = false

          adv = conf:taboption("advanced", Flag, "rdb", translate("RDB режим"))
          adv.rmempty = false

          adv = conf:taboption("advanced", Value, "logpath", translate("Путь к основному логу"))
          adv.placeholder = "/tmp/torrserver.log"

          adv = conf:taboption("advanced", Value, "weblogpath", translate("Путь к web-логу"))
          adv.placeholder = "/tmp/torrserver-web.log"

          adv = conf:taboption("advanced", Value, "torrentsdir", translate("Каталог .torrent файлов"))
          adv.placeholder = "/opt/torrserver/torrents"

          adv = conf:taboption("advanced", Value, "torrentaddr", translate("Внешний адрес torrent listen"))
          adv.placeholder = "example.com:6881"

          adv = conf:taboption("advanced", Value, "pubipv4", translate("Публичный IPv4"))
          adv.datatype = "ip4addr"
          adv.optional = true

          adv = conf:taboption("advanced", Value, "pubipv6", translate("Публичный IPv6"))
          adv.datatype = "ip6addr"
          adv.optional = true

          adv = conf:taboption("advanced", Flag, "searchwa", translate("Включить web/api поиск"))
          adv.rmempty = false

          adv = conf:taboption("advanced", Value, "maxsize", translate("Макс. размер файла / кеша"))
          adv.placeholder = "64M"
          adv.datatype = "string"

          adv = conf:taboption("advanced", Value, "tg", translate("Telegram token/chat или tg-параметр"))
          adv.datatype = "string"
          adv.optional = true

          adv = conf:taboption("advanced", Value, "fuse", translate("FUSE опции / mountpoint"))
          adv.datatype = "string"
          adv.optional = true

          adv = conf:taboption("advanced", Flag, "webdav", translate("Включить WebDAV"))
          adv.rmempty = false

          adv = conf:taboption("advanced", Value, "proxyurl", translate("Upstream proxy URL"))
          adv.placeholder = "http://127.0.0.1:8080"
          adv.datatype = "string"
          adv.optional = true

          local log_view = [[
          <style>
              .log-box {
                  width: 100%; margin-top: 5px;
                  background: #2b2b2b; color: #f8f8f2;
                  border-radius: 4px; padding: 10px;
                  font-family: monospace; font-size: 11px;
                  height: 300px;
                  overflow-y: auto; white-space: pre-wrap;
                  display: none; border: 1px solid #444;
                  text-align: left;
              }
          </style>

          <div id="ts_log" class="log-box">Загрузка...</div>

          <script type="text/javascript">
              var u_log_api = ']] .. jsq(url_log) .. [[';

              function toggleLog(e) {
                  if (e) e.preventDefault();
                  var el = document.getElementById('ts_log');
                  if (el.style.display === 'block') {
                      el.style.display = 'none';
                  } else {
                      el.style.display = 'block';
                      fetchLog();
                      setTimeout(function() { el.scrollIntoView({behavior: 'smooth', block: 'start'}); }, 100);
                  }
              }

              function fetchLog() {
                  var el = document.getElementById('ts_log');
                  el.innerText = 'Загрузка лога...';
                  XHR.get(u_log_api, null, function(x, data) {
                      if (x && x.responseText) {
                          el.innerText = x.responseText;
                      } else {
                          el.innerText = 'Нет данных.';
                      }
                  });
              }
          </script>
          ]]

          s_log = m:section(NamedSection, "main", "torrserver", nil)
          s_log.anonymous = true
          l = s_log:option(DummyValue, "_log_area")
          l.rawhtml = true
          l.value = log_view

          return m
          EOF

          dos2unix \
            root/usr/lib/lua/luci/controller/torrserver.lua \
            root/usr/lib/lua/luci/model/cbi/torrserver.lua

      - name: Create package scripts
        shell: bash
        run: |
          set -euxo pipefail

          cat > packaging/postinstall.sh <<EOF
          #!/bin/sh
          echo ""
          echo "============================================================"
          echo " Installed ${PKG_NAME} version ${PKG_VERSION}"
          echo " This package is a LuCI companion for the TorrServer daemon."
          echo " Required daemon package: torrserver"
          echo " Menu path: Services -> TorrServer"
          echo "============================================================"

          [ -n "\${IPKG_INSTROOT}" ] && exit 0

          rm -f /tmp/luci-indexcache /tmp/luci-modulecache 2>/dev/null || true
          /etc/init.d/uhttpd reload >/dev/null 2>&1 || true

          echo "[postinstall] LuCI cache cleared."
          echo "[postinstall] done."
          exit 0
          EOF

          cat > packaging/preremove.sh <<'EOF'
          #!/bin/sh
          echo ""
          echo "============================================================"
          echo " Removing luci-app-torrserver"
          echo " TorrServer daemon package remains installed."
          echo "============================================================"

          [ -n "${IPKG_INSTROOT}" ] && exit 0

          rm -f /tmp/luci-indexcache /tmp/luci-modulecache 2>/dev/null || true

          echo "[preremove] LuCI cache cleared."
          echo "[preremove] done."
          exit 0
          EOF

          cat > packaging/postremove.sh <<'EOF'
          #!/bin/sh
          echo ""
          echo "============================================================"
          echo " luci-app-torrserver removed"
          echo " No daemon config or TorrServer data was deleted."
          echo "============================================================"
          exit 0
          EOF

          chmod 0755 \
            packaging/postinstall.sh \
            packaging/preremove.sh \
            packaging/postremove.sh

      - name: Build IPK and APK packages
        shell: bash
        run: |
          set -euxo pipefail

          export SOURCE_DATE_EPOCH=1704067200
          export PKG_DESC="Simple LuCI web interface for managing TorrServer on OpenWrt"

          make_nfpm_yaml() {
            local fmt="$1"
            local yaml_path="$2"

            cat > "${yaml_path}" <<EOF
          name: ${PKG_NAME}
          arch: ${PKG_ARCH}
          platform: linux
          version: ${PKG_VERSION}
          section: luci
          priority: optional
          maintainer: ${GITHUB_REPOSITORY_OWNER}
          description: "${PKG_DESC}"
          homepage: https://github.com/${GITHUB_REPOSITORY}
          license: MIT

          depends:
            - luci-base
            - luci-compat
            - torrserver

          contents:
            - src: ./root/usr/lib/lua/luci/controller/torrserver.lua
              dst: /usr/lib/lua/luci/controller/torrserver.lua
              file_info:
                mode: 0644
                mtime: 2024-01-01T00:00:00Z

            - src: ./root/usr/lib/lua/luci/model/cbi/torrserver.lua
              dst: /usr/lib/lua/luci/model/cbi/torrserver.lua
              file_info:
                mode: 0644
                mtime: 2024-01-01T00:00:00Z

          scripts:
            postinstall: ./packaging/postinstall.sh
            preremove: ./packaging/preremove.sh
            postremove: ./packaging/postremove.sh
          EOF
          }

          make_nfpm_yaml "ipk" "nfpm_ipk.yaml"
          nfpm package --config nfpm_ipk.yaml --packager ipk --target "${PKG_NAME}_${PKG_VERSION}_${PKG_ARCH}.ipk"
          test -f "${PKG_NAME}_${PKG_VERSION}_${PKG_ARCH}.ipk"

          make_nfpm_yaml "apk" "nfpm_apk.yaml"
          nfpm package --config nfpm_apk.yaml --packager apk --target "${PKG_NAME}_${PKG_VERSION}_${PKG_ARCH}.apk"
          test -f "${PKG_NAME}_${PKG_VERSION}_${PKG_ARCH}.apk"

      - name: Show built files
        shell: bash
        run: |
          set -euxo pipefail
          ls -la
          echo
          echo "IPK:"
          ls -la *.ipk
          echo
          echo "APK:"
          ls -la *.apk

      - name: Generate checksums
        shell: bash
        run: |
          set -euxo pipefail
          sha256sum *.ipk *.apk > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: luci-app-torrserver-${{ env.PKG_VERSION }}
          if-no-files-found: error
          path: |
            *.ipk
            *.apk
            SHA256SUMS.txt

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          files: |
            *.ipk
            *.apk
            SHA256SUMS.txt
          draft: false
          prerelease: false
