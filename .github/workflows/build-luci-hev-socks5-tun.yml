name: Build and Release LuCI App for HEV SOCKS5 Tunnel v4

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Enter package version (e.g. 0.1.0) or branch label'
        required: true
        default: '2.14.4'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PKG_NAME: luci-app-hev-socks5-tunnel

    steps:
      - name: Extract version
        id: vars
        run: |
          set -euxo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "VERSION=${{ github.event.inputs.build_target }}" >> "$GITHUB_ENV"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
          else
            echo "VERSION=nightly" >> "$GITHUB_ENV"
          fi

      - name: Checkout local repository
        uses: actions/checkout@v4

      - name: Install nFPM and helpers
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y dos2unix curl tar xz-utils jq

          NFPM_VER="2.43.1"
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VER}/nfpm_${NFPM_VER}_Linux_x86_64.tar.gz" | tar -xz
          sudo install -m 0755 nfpm /usr/local/bin/nfpm

      - name: Generate LuCI package files
        run: |
          set -euxo pipefail

          PKGROOT="${GITHUB_WORKSPACE}/pkgroot"

          mkdir -p \
            "${PKGROOT}/etc/config" \
            "${PKGROOT}/etc/init.d" \
            "${PKGROOT}/usr/libexec" \
            "${PKGROOT}/usr/share/luci/menu.d" \
            "${PKGROOT}/usr/share/rpcd/acl.d" \
            "${PKGROOT}/www/luci-static/resources/view/hev-socks5-tunnel"

          cat > "${PKGROOT}/etc/config/luci-hev-socks5-tunnel" <<'EOF'
          config main 'config'
              option enabled '0'
              option tunnel_name 'tun0'
              option mtu '8500'
              option ipv6 '0'
              option username ''
              option password ''
              option server_host '127.0.0.1'
              option server_port '1080'
              option udp '1'
              option tcp_buffer_size '4096'
              option udp_buffer_size '4096'
              option task_stack_size '24576'
              option mapdns '0'
              option mapdns_host '127.0.0.1'
              option mapdns_port '5353'
              option default_route '0'
              list route_include '192.168.50.0/24'
              list route_exclude '192.168.11.0/24'
          EOF

          cat > "${PKGROOT}/usr/libexec/luci-hev-socks5-tunnel-render" <<'EOF'
          #!/bin/sh
          set -eu

          . /lib/functions.sh

          UI_CFG="luci-hev-socks5-tunnel"
          OUT_DIR="/etc/hev-socks5-tunnel"
          OUT_FILE="${OUT_DIR}/main.yml"

          is_ipv4() {
              echo "$1" | grep -Eq '^(25[0-5]|2[0-4][0-9]|1?[0-9]?[0-9])(\.(25[0-5]|2[0-4][0-9]|1?[0-9]?[0-9])){3}$'
          }

          is_hostname() {
              echo "$1" | grep -Eq '^[A-Za-z0-9._:-]+$'
          }

          yaml_escape() {
              printf '%s' "$1" | sed 's/\\/\\\\/g; s/"/\\"/g'
          }

          render_bool() {
              [ "$1" = "1" ] && echo "true" || echo "false"
          }

          config_load "$UI_CFG"

          config_get enabled config enabled 0
          config_get tunnel_name config tunnel_name "tun0"
          config_get mtu config mtu "8500"
          config_get ipv6 config ipv6 0
          config_get username config username ""
          config_get password config password ""
          config_get server_host config server_host "127.0.0.1"
          config_get server_port config server_port "1080"
          config_get udp config udp 1
          config_get tcp_buffer_size config tcp_buffer_size "4096"
          config_get udp_buffer_size config udp_buffer_size "4096"
          config_get task_stack_size config task_stack_size "24576"
          config_get mapdns config mapdns 0
          config_get mapdns_host config mapdns_host "127.0.0.1"
          config_get mapdns_port config mapdns_port "5353"

          echo "$tunnel_name" | grep -Eq '^[A-Za-z0-9._-]+$'
          echo "$mtu" | grep -Eq '^[0-9]{3,5}$'
          echo "$server_port" | grep -Eq '^[0-9]{1,5}$'
          echo "$tcp_buffer_size" | grep -Eq '^[0-9]+$'
          echo "$udp_buffer_size" | grep -Eq '^[0-9]+$'
          echo "$task_stack_size" | grep -Eq '^[0-9]+$'
          echo "$mapdns_port" | grep -Eq '^[0-9]{1,5}$'
          is_ipv4 "$server_host" || is_hostname "$server_host"
          is_ipv4 "$mapdns_host" || is_hostname "$mapdns_host"

          mkdir -p "$OUT_DIR"

          cat > "$OUT_FILE" <<YAML
          main:
            workers: 1

          tunnel:
            name: "$(yaml_escape "$tunnel_name")"
            mtu: $mtu
            ipv6: $(render_bool "$ipv6")
            multi-queue: false
            tcp-buffer-size: $tcp_buffer_size
            udp-buffer-size: $udp_buffer_size

          socks5:
            address: "$(yaml_escape "$server_host")"
            port: $server_port
            udp: $(render_bool "$udp")
          YAML

          if [ -n "$username" ]; then
            cat >> "$OUT_FILE" <<YAML
            username: "$(yaml_escape "$username")"
          YAML
          fi

          if [ -n "$password" ]; then
            cat >> "$OUT_FILE" <<YAML
            password: "$(yaml_escape "$password")"
          YAML
          fi

          cat >> "$OUT_FILE" <<YAML

          misc:
            task-stack-size: $task_stack_size
            connect-timeout: 5000
            read-write-timeout: 60000
            log-file: stdout
            log-level: info
          YAML

          if [ "$mapdns" = "1" ]; then
            cat >> "$OUT_FILE" <<YAML

          mapdns:
            address: "$(yaml_escape "$mapdns_host")"
            port: $mapdns_port
          YAML
          fi

          uci -q batch <<UCI
          set hev-socks5-tunnel.config=hev-socks5-tunnel
          set hev-socks5-tunnel.config.enabled='${enabled}'
          set hev-socks5-tunnel.config.conffile='${OUT_FILE}'
          commit hev-socks5-tunnel
          UCI

          exit 0
          EOF

          cat > "${PKGROOT}/usr/libexec/luci-hev-socks5-tunnel-ctl" <<'EOF'
          #!/bin/sh
          set -eu

          ACTION="${1:-status}"

          render() {
              /usr/libexec/luci-hev-socks5-tunnel-render
          }

          backend_missing() {
              [ -x /etc/init.d/hev-socks5-tunnel ] || return 0
              return 1
          }

          case "$ACTION" in
              start)
                  if backend_missing; then
                      echo "Backend package 'hev-socks5-tunnel' is missing."
                      echo "Run:"
                      echo "  opkg update"
                      echo "  opkg install hev-socks5-tunnel"
                      exit 1
                  fi
                  render
                  /etc/init.d/hev-socks5-tunnel start
                  /etc/init.d/luci-hev-socks5-tunnel-route restart || true
              ;;
              stop)
                  /etc/init.d/luci-hev-socks5-tunnel-route stop || true
                  [ -x /etc/init.d/hev-socks5-tunnel ] && /etc/init.d/hev-socks5-tunnel stop || true
              ;;
              restart)
                  if backend_missing; then
                      echo "Backend package 'hev-socks5-tunnel' is missing."
                      echo "Run:"
                      echo "  opkg update"
                      echo "  opkg install hev-socks5-tunnel"
                      exit 1
                  fi
                  render
                  /etc/init.d/hev-socks5-tunnel restart
                  /etc/init.d/luci-hev-socks5-tunnel-route restart || true
              ;;
              reload)
                  if backend_missing; then
                      echo "Backend package 'hev-socks5-tunnel' is missing."
                      echo "Run:"
                      echo "  opkg update"
                      echo "  opkg install hev-socks5-tunnel"
                      exit 1
                  fi
                  render
                  /etc/init.d/hev-socks5-tunnel reload || /etc/init.d/hev-socks5-tunnel restart
                  /etc/init.d/luci-hev-socks5-tunnel-route restart || true
              ;;
              render)
                  render
              ;;
              status)
                  [ -x /etc/init.d/hev-socks5-tunnel ] && /etc/init.d/hev-socks5-tunnel status || true
              ;;
              *)
                  echo "Unsupported action: $ACTION" >&2
                  exit 1
              ;;
          esac
          EOF

          cat > "${PKGROOT}/etc/init.d/luci-hev-socks5-tunnel-route" <<'EOF'
          #!/bin/sh /etc/rc.common

          START=96
          STOP=15

          . /lib/functions.sh

          UI_CFG="luci-hev-socks5-tunnel"
          TUN_IF_DEFAULT="tun0"

          is_ipv4() {
              echo "$1" | grep -Eq '^(25[0-5]|2[0-4][0-9]|1?[0-9]?[0-9])(\.(25[0-5]|2[0-4][0-9]|1?[0-9]?[0-9])){3}$'
          }

          is_ipv4_cidr() {
              local v="$1"
              local ip mask

              case "$v" in
                  */*)
                      ip="${v%/*}"
                      mask="${v#*/}"
                      is_ipv4 "$ip" || return 1
                      echo "$mask" | grep -Eq '^(3[0-2]|[12]?[0-9])$' || return 1
                      return 0
                  ;;
                  *)
                      is_ipv4 "$v"
                      return $?
                  ;;
              esac
          }

          get_route_dev_for_ip() {
              local ip="$1"
              ip route get "$ip" 2>/dev/null | awk '{
                  for (i = 1; i <= NF; i++) {
                      if ($i == "dev") {
                          print $(i + 1)
                          exit
                      }
                  }
              }'
          }

          get_route_via_for_ip() {
              local ip="$1"
              ip route get "$ip" 2>/dev/null | awk '{
                  for (i = 1; i <= NF; i++) {
                      if ($i == "via") {
                          print $(i + 1)
                          exit
                      }
                  }
              }'
          }

          server_probe_ip() {
              local host
              config_get host config server_host ""
              [ -n "$host" ] || return 1
              if is_ipv4 "$host"; then
                  printf '%s\n' "$host"
                  return 0
              fi
              resolveip -4 "$host" 2>/dev/null | awk 'NR==1{print $1}'
          }

          add_bypass_route() {
              local probe dev via

              probe="$(server_probe_ip 2>/dev/null || true)"
              [ -n "$probe" ] || return 0

              dev="$(get_route_dev_for_ip "$probe")"
              via="$(get_route_via_for_ip "$probe")"
              [ -n "$dev" ] || return 0

              if [ -n "$via" ]; then
                  ip route replace "$probe" via "$via" dev "$dev" 2>/dev/null || true
              else
                  ip route replace "$probe" dev "$dev" 2>/dev/null || true
              fi
          }

          del_bypass_route() {
              local probe
              probe="$(server_probe_ip 2>/dev/null || true)"
              [ -n "$probe" ] || return 0
              ip route del "$probe" 2>/dev/null || true
          }

          add_default_routes() {
              local tun_if
              config_get tun_if config tunnel_name "$TUN_IF_DEFAULT"
              ip route replace 0.0.0.0/1 dev "$tun_if" 2>/dev/null || true
              ip route replace 128.0.0.0/1 dev "$tun_if" 2>/dev/null || true
          }

          del_default_routes() {
              local tun_if
              config_get tun_if config tunnel_name "$TUN_IF_DEFAULT"
              ip route del 0.0.0.0/1 dev "$tun_if" 2>/dev/null || true
              ip route del 128.0.0.0/1 dev "$tun_if" 2>/dev/null || true
          }

          _apply_include_route() {
              local entry="$1"
              local tun_if
              config_get tun_if config tunnel_name "$TUN_IF_DEFAULT"
              is_ipv4_cidr "$entry" || return 0
              ip route replace "$entry" dev "$tun_if" 2>/dev/null || true
          }

          apply_include_routes() {
              config_list_foreach config route_include _apply_include_route
          }

          _remove_include_route() {
              local entry="$1"
              local tun_if
              config_get tun_if config tunnel_name "$TUN_IF_DEFAULT"
              is_ipv4_cidr "$entry" || return 0
              ip route del "$entry" dev "$tun_if" 2>/dev/null || true
          }

          remove_include_routes() {
              config_list_foreach config route_include _remove_include_route
          }

          _apply_exclude_route() {
              local entry="$1"
              local probe_ip dev via

              is_ipv4_cidr "$entry" || return 0

              probe_ip="${entry%/*}"
              dev="$(get_route_dev_for_ip "$probe_ip")"
              via="$(get_route_via_for_ip "$probe_ip")"
              [ -n "$dev" ] || return 0

              if [ -n "$via" ]; then
                  ip route replace "$entry" via "$via" dev "$dev" 2>/dev/null || true
              else
                  ip route replace "$entry" dev "$dev" 2>/dev/null || true
              fi
          }

          apply_exclude_routes() {
              config_list_foreach config route_exclude _apply_exclude_route
          }

          _remove_exclude_route() {
              local entry="$1"
              is_ipv4_cidr "$entry" || return 0
              ip route del "$entry" 2>/dev/null || true
          }

          remove_exclude_routes() {
              config_list_foreach config route_exclude _remove_exclude_route
          }

          wait_and_apply() {
              local tun_if timeout=20 default_route

              config_load "$UI_CFG"
              config_get tun_if config tunnel_name "$TUN_IF_DEFAULT"
              config_get_bool default_route config default_route 0

              while [ "$timeout" -gt 0 ]; do
                  if [ -d "/sys/class/net/$tun_if" ]; then
                      ip link set dev "$tun_if" up 2>/dev/null || true

                      if ip link show "$tun_if" 2>/dev/null | grep -qv 'state DOWN'; then
                          add_bypass_route
                          [ "$default_route" -eq 1 ] && add_default_routes
                          apply_include_routes
                          apply_exclude_routes
                          logger -t luci-hev-socks5-tunnel-route "Routes applied to $tun_if"
                          return 0
                      fi
                  fi

                  sleep 1
                  timeout=$((timeout - 1))
              done

              logger -t luci-hev-socks5-tunnel-route "Tunnel device did not become operational in time"
              return 0
          }

          start() {
              wait_and_apply &
          }

          stop() {
              config_load "$UI_CFG"
              del_default_routes
              del_bypass_route
              remove_include_routes
              remove_exclude_routes
          }

          restart() {
              stop
              start
          }
          EOF

          cat > "${PKGROOT}/usr/share/luci/menu.d/luci-app-hev-socks5-tunnel.json" <<'EOF'
          {
            "admin/services/hev-socks5-tunnel": {
              "title": "HEV SOCKS5 Tunnel",
              "order": 91,
              "action": {
                "type": "view",
                "path": "hev-socks5-tunnel/config"
              },
              "depends": {
                "acl": [ "luci-app-hev-socks5-tunnel" ]
              }
            }
          }
          EOF

          cat > "${PKGROOT}/usr/share/rpcd/acl.d/luci-app-hev-socks5-tunnel.json" <<'EOF'
          {
            "luci-app-hev-socks5-tunnel": {
              "description": "Grant access to HEV SOCKS5 Tunnel configuration and diagnostics",
              "read": {
                "uci": [
                  "luci-hev-socks5-tunnel",
                  "hev-socks5-tunnel"
                ],
                "ubus": {
                  "service": [ "list" ],
                  "file": [ "stat", "read", "write", "exec" ]
                },
                "file": {
                  "/sys/class/net/tun0": [ "stat" ],
                  "/proc/meminfo": [ "read" ],
                  "/etc/hev-socks5-tunnel/main.yml": [ "read", "write" ],
                  "/usr/libexec/luci-hev-socks5-tunnel-render": [ "exec" ],
                  "/usr/libexec/luci-hev-socks5-tunnel-ctl": [ "exec" ],
                  "/sbin/logread": [ "exec" ],
                  "/etc/init.d/hev-socks5-tunnel": [ "stat" ]
                }
              },
              "write": {
                "uci": [
                  "luci-hev-socks5-tunnel",
                  "hev-socks5-tunnel"
                ]
              }
            }
          }
          EOF

          cat > "${PKGROOT}/www/luci-static/resources/view/hev-socks5-tunnel/config.js" <<'EOF'
          'use strict';
          'require view';
          'require form';
          'require rpc';
          'require poll';
          'require ui';
          'require uci';
          'require fs';

          var callServiceList = rpc.declare({
              object: 'service',
              method: 'list',
              params: [ 'name' ],
              expect: { '': {} }
          });

          function isValidIPv4(s) {
              return /^(25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)(\.(25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)){3}$/.test(String(s || ''));
          }

          function isValidIPv4CIDR(s) {
              var v = String(s || '');
              var m = v.match(/^(.+)\/(\d{1,2})$/);
              if (!m)
                  return isValidIPv4(v);
              return isValidIPv4(m[1]) && (+m[2] >= 0 && +m[2] <= 32);
          }

          function pidFromText(data) {
              var s = String(data || '').trim();
              return /^\d+$/.test(s) ? s : null;
          }

          function badge(label, ok) {
              return '<span style="display:inline-block;padding:2px 8px;border-radius:999px;font-weight:600;color:#fff;background:' +
                  (ok ? '#16a34a' : '#dc2626') + '">' + label + '</span>';
          }

          function formatKBToMB(kb) {
              var n = parseInt(kb, 10);
              if (isNaN(n) || n < 0)
                  return '-';
              return (n / 1024).toFixed(1) + ' MB';
          }

          return view.extend({
              _statusNode: null,
              _logNode: null,
              _yamlNode: null,
              _actionNode: null,
              _buttons: [],
              _pollRegistered: false,
              _backendPresent: false,

              load: function() {
                  return Promise.all([
                      uci.load('luci-hev-socks5-tunnel'),
                      L.resolveDefault(fs.stat('/etc/init.d/hev-socks5-tunnel'), null)
                  ]);
              },

              readProcStatusValue: function(pid, fieldName) {
                  if (!pid)
                      return Promise.resolve(null);

                  return L.resolveDefault(fs.read_direct('/proc/' + pid + '/status'), '').then(function(txt) {
                      var m = String(txt || '').match(new RegExp('^' + fieldName + ':\\s+([0-9]+)\\s+kB$', 'm'));
                      return m ? m[1] : null;
                  });
              },

              readMemAvailable: function() {
                  return L.resolveDefault(fs.read_direct('/proc/meminfo'), '').then(function(txt) {
                      var m = String(txt || '').match(/^MemAvailable:\s+([0-9]+)\s+kB$/m);
                      return m ? m[1] : null;
                  });
              },

              fetchRuntime: function() {
                  return Promise.all([
                      L.resolveDefault(callServiceList('hev-socks5-tunnel'), {}),
                      L.resolveDefault(fs.read_direct('/var/run/hev-socks5-tunnel.pid'), ''),
                      L.resolveDefault(fs.stat('/sys/class/net/tun0'), null),
                      this.readMemAvailable()
                  ]).then(L.bind(function(res) {
                      var svc = (res[0] || {})['hev-socks5-tunnel'] || {};
                      var inst = svc.instances || {};
                      var key = Object.keys(inst)[0];
                      var first = key ? inst[key] : {};
                      var pid = first.pid || pidFromText(res[1]) || null;
                      var running = first.running === true || !!pid;

                      return Promise.all([
                          Promise.resolve({ running: running, pid: pid }),
                          Promise.resolve(res[2]),
                          this.readProcStatusValue(pid, 'VmRSS'),
                          Promise.resolve(res[3])
                      ]);
                  }, this)).then(function(res) {
                      return {
                          state: res[0],
                          tun: res[1],
                          rssKb: res[2],
                          freeMemKb: res[3]
                      };
                  });
              },

              renderBackendWarning: function() {
                  if (this._backendPresent)
                      return '';

                  return [
                      '<div style="margin-bottom:12px;padding:12px;border:1px solid #fca5a5;border-radius:10px;background:#fef2f2;color:#991b1b">',
                      '<strong>' + _('Backend package missing') + '</strong><br/>',
                      _('This LuCI app requires the official hev-socks5-tunnel package to be installed separately.') + '<br/><br/>',
                      '<code>opkg update<br/>opkg install hev-socks5-tunnel</code>',
                      '</div>'
                  ].join('');
              },

              renderStatusHtml: function(runtime) {
                  var state = runtime.state;
                  var tunObj = runtime.tun;
                  var pid = state.pid ? String(state.pid) : '-';
                  var tunText = tunObj ? _('Present') : _('Missing');

                  return [
                      this.renderBackendWarning(),
                      '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;align-items:stretch">',
                        '<div style="padding:10px;border:1px solid #d1d5db;border-radius:10px;background:#fff">',
                          '<div style="font-size:12px;color:#6b7280;margin-bottom:6px">' + _('HEV daemon') + '</div>',
                          '<div>' + badge(state.running ? _('Running') : _('Stopped'), state.running) + '</div>',
                          '<div style="margin-top:8px"><strong>' + _('PID') + ':</strong> ' + pid + '</div>',
                          '<div style="margin-top:4px"><strong>' + _('RSS') + ':</strong> ' + formatKBToMB(runtime.rssKb) + '</div>',
                        '</div>',
                        '<div style="padding:10px;border:1px solid #d1d5db;border-radius:10px;background:#fff">',
                          '<div style="font-size:12px;color:#6b7280;margin-bottom:6px">' + _('Tunnel interface') + '</div>',
                          '<div><strong>tun0:</strong> ' + tunText + '</div>',
                          '<div style="margin-top:8px"><strong>' + _('Free RAM') + ':</strong> ' + formatKBToMB(runtime.freeMemKb) + '</div>',
                        '</div>',
                      '</div>'
                  ].join('');
              },

              refreshStatus: function() {
                  if (!this._statusNode)
                      return Promise.resolve();

                  return this.fetchRuntime().then(L.bind(function(runtime) {
                      this._statusNode.innerHTML = this.renderStatusHtml(runtime);
                  }, this)).catch(function() {});
              },

              refreshLogs: function() {
                  if (!this._logNode)
                      return Promise.resolve();

                  this._logNode.value = _('Refreshing logs...');

                  return L.resolveDefault(fs.exec_direct('/sbin/logread', ['-e', 'hev-socks5-tunnel'], 'text'), '')
                      .then(L.bind(function(output) {
                          this._logNode.value = String(output || '').trim() || _('No HEV log entries yet.');
                          this._logNode.scrollTop = this._logNode.scrollHeight;
                      }, this))
                      .catch(L.bind(function(err) {
                          this._logNode.value = (err && err.message) ? err.message : _('Unable to read logs.');
                      }, this));
              },

              refreshYamlPreview: function() {
                  if (!this._yamlNode)
                      return Promise.resolve();

                  return L.resolveDefault(fs.read_direct('/etc/hev-socks5-tunnel/main.yml'), '')
                      .then(L.bind(function(output) {
                          this._yamlNode.value = String(output || '').trim() || _('YAML file has not been generated yet.');
                      }, this))
                      .catch(L.bind(function(err) {
                          this._yamlNode.value = (err && err.message) ? err.message : _('Unable to read generated YAML.');
                      }, this));
              },

              setActionState: function(busy, text) {
                  if (this._actionNode)
                      this._actionNode.textContent = text || '';

                  this._buttons.forEach(function(btn) {
                      if (btn)
                          btn.disabled = !!busy;
                  });
              },

              runControlAction: function(action) {
                  this.setActionState(true, _('Executing action: ') + action + ' ...');

                  return L.resolveDefault(fs.exec_direct('/usr/libexec/luci-hev-socks5-tunnel-ctl', [action], 'text'), '')
                      .then(L.bind(function() {
                          return new Promise(function(resolve) { window.setTimeout(resolve, 1500); });
                      }, this))
                      .then(L.bind(function() {
                          return Promise.all([
                              this.refreshStatus(),
                              this.refreshLogs(),
                              this.refreshYamlPreview()
                          ]);
                      }, this))
                      .then(L.bind(function() {
                          this.setActionState(false, _('Last action completed: ') + action);
                      }, this))
                      .catch(L.bind(function(err) {
                          this.setActionState(false, (err && err.message) ? err.message : _('Operation failed'));
                          ui.addNotification(null, E('p', {}, (err && err.message) ? err.message : _('Operation failed')));
                      }, this));
              },

              handleServiceAction: function(action) {
                  return ui.createHandlerFn(this, function() {
                      return this.runControlAction(action);
                  });
              },

              handleSaveApply: function(ev, mode) {
                  return this.super('handleSaveApply', [ev, mode]).then(L.bind(function() {
                      this.setActionState(true, _('Saving settings and rendering YAML ...'));

                      return L.resolveDefault(fs.exec_direct('/usr/libexec/luci-hev-socks5-tunnel-ctl', ['render'], 'text'), '')
                          .then(L.bind(function() {
                              return Promise.all([
                                  this.refreshYamlPreview(),
                                  this.refreshStatus()
                              ]);
                          }, this))
                          .then(L.bind(function() {
                              this.setActionState(false, _('Settings saved and YAML updated.'));
                          }, this))
                          .catch(L.bind(function(err) {
                              this.setActionState(false, (err && err.message) ? err.message : _('YAML generation failed'));
                          }, this));
                  }, this));
              },

              render: function(loadData) {
                  var m, s, o;
                  var self = this;

                  this._backendPresent = !!loadData[1];

                  m = new form.Map('luci-hev-socks5-tunnel', _('HEV SOCKS5 Tunnel'),
                      _('LuCI front-end for the official hev-socks5-tunnel package. This page stores rich settings in UCI, renders a readable YAML file for the daemon, and controls the official OpenWrt service.'));

                  s = m.section(form.TypedSection, 'main', _('Live Status'));
                  s.anonymous = true;

                  o = s.option(form.DummyValue, '_status', _('Runtime state'),
                      _('Shows daemon state, process ID, current memory usage, tun0 presence and available RAM. This block is updated through lightweight polling only.'));
                  o.rawhtml = true;
                  o.cfgvalue = function() {
                      return '<div data-hev-status="1">' + _('Loading status...') + '</div>';
                  };

                  o = s.option(form.Button, '_start');
                  o.title = _('Start service');
                  o.description = _('Render YAML, start the official hev-socks5-tunnel daemon and apply route helper settings.');
                  o.inputtitle = _('Start');
                  o.inputstyle = 'apply';
                  o.onclick = this.handleServiceAction('start');

                  o = s.option(form.Button, '_stop');
                  o.title = _('Stop service');
                  o.description = _('Stop the daemon and remove any route helper changes applied by this LuCI package.');
                  o.inputtitle = _('Stop');
                  o.inputstyle = 'remove';
                  o.onclick = this.handleServiceAction('stop');

                  o = s.option(form.Button, '_restart');
                  o.title = _('Restart service');
                  o.description = _('Regenerate YAML, restart the daemon and re-apply tunnel route settings.');
                  o.inputtitle = _('Restart');
                  o.inputstyle = 'apply';
                  o.onclick = this.handleServiceAction('restart');

                  o = s.option(form.DummyValue, '_action_state', _('Action result'),
                      _('Shows the latest service action result without requiring a page reload.'));
                  o.rawhtml = true;
                  o.cfgvalue = function() {
                      return '<div data-hev-action="1" style="min-height:1.4em;color:#6b7280">' + _('No action executed yet.') + '</div>';
                  };

                  s = m.section(form.TypedSection, 'main', _('Configuration'));
                  s.anonymous = true;

                  o = s.option(form.Flag, 'enabled', _('Enable service'),
                      _('Enable automatic daemon startup by updating the official hev-socks5-tunnel UCI section and using the generated YAML file path.'));
                  o.rmempty = false;

                  o = s.option(form.Value, 'tunnel_name', _('Tunnel interface name'),
                      _('Name of the TUN interface, for example tun0.'));
                  o.datatype = 'uciname';
                  o.placeholder = 'tun0';
                  o.rmempty = false;

                  o = s.option(form.Value, 'mtu', _('Tunnel MTU'),
                      _('Interface MTU written into the generated YAML configuration.'));
                  o.datatype = 'uinteger';
                  o.placeholder = '8500';
                  o.rmempty = false;

                  o = s.option(form.Flag, 'ipv6', _('Enable IPv6'),
                      _('Enable IPv6 handling in the generated HEV tunnel YAML configuration.'));
                  o.rmempty = false;

                  o = s.option(form.Value, 'server_host', _('SOCKS5 server host'),
                      _('IPv4 address or hostname of the upstream SOCKS5 server.'));
                  o.datatype = 'host';
                  o.placeholder = '127.0.0.1';
                  o.rmempty = false;

                  o = s.option(form.Value, 'server_port', _('SOCKS5 server port'),
                      _('Port number of the upstream SOCKS5 server.'));
                  o.datatype = 'port';
                  o.placeholder = '1080';
                  o.rmempty = false;

                  o = s.option(form.Value, 'username', _('Username'),
                      _('Optional username for SOCKS5 authentication.'));
                  o.rmempty = true;

                  o = s.option(form.Value, 'password', _('Password'),
                      _('Optional password for SOCKS5 authentication.'));
                  o.password = true;
                  o.rmempty = true;

                  o = s.option(form.Flag, 'udp', _('Enable UDP relay'),
                      _('Enable UDP support in the generated HEV SOCKS5 section when your upstream SOCKS5 server supports it.'));
                  o.rmempty = false;

                  o = s.option(form.Flag, 'mapdns', _('Enable mapdns'),
                      _('Enable HEV mapdns support and emit the corresponding YAML section.'));
                  o.rmempty = false;

                  o = s.option(form.Value, 'mapdns_host', _('MapDNS host'),
                      _('Address of the DNS helper service used when mapdns is enabled.'));
                  o.datatype = 'host';
                  o.placeholder = '127.0.0.1';
                  o.depends('mapdns', '1');

                  o = s.option(form.Value, 'mapdns_port', _('MapDNS port'),
                      _('Port of the DNS helper service used when mapdns is enabled.'));
                  o.datatype = 'port';
                  o.placeholder = '5353';
                  o.depends('mapdns', '1');

                  o = s.option(form.Value, 'tcp_buffer_size', _('TCP buffer size'),
                      _('TCP buffer size written into the tunnel section of the generated YAML file.'));
                  o.datatype = 'uinteger';
                  o.placeholder = '4096';
                  o.rmempty = false;

                  o = s.option(form.Value, 'udp_buffer_size', _('UDP buffer size'),
                      _('UDP buffer size written into the tunnel section of the generated YAML file.'));
                  o.datatype = 'uinteger';
                  o.placeholder = '4096';
                  o.rmempty = false;

                  o = s.option(form.Value, 'task_stack_size', _('Task stack size'),
                      _('Worker stack size written into the misc section of the generated YAML file.'));
                  o.datatype = 'uinteger';
                  o.placeholder = '24576';
                  o.rmempty = false;

                  o = s.option(form.Flag, 'default_route', _('Default route to tunnel'),
                      _('Redirect all IPv4 traffic through the tunnel while keeping the SOCKS5 endpoint reachable through its original route.'));
                  o.rmempty = false;

                  o = s.option(form.DynamicList, 'route_include', _('IPv4 subnets via tunnel'),
                      _('Add IPv4 addresses or CIDR subnets that should be routed through the tunnel in addition to any enabled default-route logic.'));
                  o.datatype = 'or(ip4addr, cidr4)';
                  o.rmempty = true;
                  o.validate = function(section_id, value) {
                      var list = Array.isArray(value) ? value : [ value ];
                      for (var i = 0; i < list.length; i++) {
                          if (String(list[i] || '').length === 0)
                              continue;
                          if (!isValidIPv4CIDR(list[i]))
                              return _('Each entry must be a valid IPv4 address or IPv4 CIDR subnet.');
                      }
                      return true;
                  };

                  o = s.option(form.DynamicList, 'route_exclude', _('IPv4 subnets bypass tunnel'),
                      _('Add IPv4 addresses or CIDR subnets that must stay on their original path even when tunnel routing is active.'));
                  o.datatype = 'or(ip4addr, cidr4)';
                  o.rmempty = true;
                  o.validate = function(section_id, value) {
                      var list = Array.isArray(value) ? value : [ value ];
                      for (var i = 0; i < list.length; i++) {
                          if (String(list[i] || '').length === 0)
                              continue;
                          if (!isValidIPv4CIDR(list[i]))
                              return _('Each entry must be a valid IPv4 address or IPv4 CIDR subnet.');
                      }
                      return true;
                  };

                  s = m.section(form.TypedSection, 'main', _('Diagnostics'));
                  s.anonymous = true;

                  o = s.option(form.DummyValue, '_yaml',
                      _('Generated YAML preview'),
                      _('Shows the human-readable YAML generated from UCI settings and written to /etc/hev-socks5-tunnel/main.yml.'));
                  o.rawhtml = true;
                  o.cfgvalue = function() {
                      return '<textarea data-hev-yaml="1" readonly="readonly" wrap="off" style="width:100%;min-height:220px;font-family:monospace;background:#f8fafc;border:1px solid #cbd5e1;border-radius:8px;padding:10px"></textarea>';
                  };

                  o = s.option(form.DummyValue, '_diag',
                      _('Live log output'),
                      _('Collapsed log viewer for quick diagnostics. It runs logread only when refreshed manually or after service actions, reducing CPU and browser load.'));
                  o.rawhtml = true;
                  o.cfgvalue = function() {
                      return [
                          '<details style="margin-top:4px">',
                          '<summary style="cursor:pointer;font-weight:600">' + _('Show HEV logs') + '</summary>',
                          '<div style="margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">',
                          '<button type="button" class="btn cbi-button cbi-button-action" data-hev-refresh-logs="1">' + _('Refresh logs') + '</button>',
                          '<span style="color:#6b7280">' + _('Runs: logread -e hev-socks5-tunnel') + '</span>',
                          '</div>',
                          '<textarea data-hev-logs="1" readonly="readonly" wrap="off" style="margin-top:10px;width:100%;min-height:220px;font-family:monospace;background:#111827;color:#e5e7eb;border:1px solid #374151;border-radius:8px;padding:10px"></textarea>',
                          '</details>'
                      ].join('');
                  };

                  return m.render().then(function(nodes) {
                      self._statusNode = nodes.querySelector('[data-hev-status="1"]');
                      self._actionNode = nodes.querySelector('[data-hev-action="1"]');
                      self._logNode = nodes.querySelector('[data-hev-logs="1"]');
                      self._yamlNode = nodes.querySelector('[data-hev-yaml="1"]');
                      self._buttons = Array.prototype.slice.call(nodes.querySelectorAll('.cbi-button'));
                      var logBtn = nodes.querySelector('[data-hev-refresh-logs="1"]');

                      if (logBtn) {
                          logBtn.addEventListener('click', function(ev) {
                              ev.preventDefault();
                              self.refreshLogs();
                          });
                      }

                      self.refreshStatus();
                      self.refreshLogs();
                      self.refreshYamlPreview();

                      if (!self._pollRegistered) {
                          poll.add(function() {
                              return self.refreshStatus();
                          }, 8);
                          self._pollRegistered = true;
                      }

                      return nodes;
                  });
              }
          });
          EOF

          chmod 0755 \
            "${PKGROOT}/usr/libexec/luci-hev-socks5-tunnel-render" \
            "${PKGROOT}/usr/libexec/luci-hev-socks5-tunnel-ctl" \
            "${PKGROOT}/etc/init.d/luci-hev-socks5-tunnel-route"

          dos2unix \
            "${PKGROOT}/etc/config/luci-hev-socks5-tunnel" \
            "${PKGROOT}/usr/libexec/luci-hev-socks5-tunnel-render" \
            "${PKGROOT}/usr/libexec/luci-hev-socks5-tunnel-ctl" \
            "${PKGROOT}/etc/init.d/luci-hev-socks5-tunnel-route" \
            "${PKGROOT}/usr/share/luci/menu.d/luci-app-hev-socks5-tunnel.json" \
            "${PKGROOT}/usr/share/rpcd/acl.d/luci-app-hev-socks5-tunnel.json" \
            "${PKGROOT}/www/luci-static/resources/view/hev-socks5-tunnel/config.js"

      - name: Build IPK and APK packages with nFPM
        run: |
          set -euxo pipefail

          export PKG_VER="${{ env.VERSION }}"
          ARCHS=("aarch64_generic" "aarch64_cortex-a53")

          cat > postinst.sh <<'EOF'
          #!/bin/sh
          echo "=============================================="
          echo "luci-app-hev-socks5-tunnel installed."
          echo
          echo "Backend daemon package is NOT bundled."
          echo "Please install it first if it is missing:"
          echo
          echo "  opkg update"
          echo "  opkg install hev-socks5-tunnel"
          echo
          echo "Then reopen LuCI and configure the service."
          echo "=============================================="

          /etc/init.d/luci-hev-socks5-tunnel-route enable 2>/dev/null || true
          /usr/libexec/luci-hev-socks5-tunnel-render >/dev/null 2>&1 || true
          /etc/init.d/rpcd reload 2>/dev/null || true
          rm -f /tmp/luci-indexcache /tmp/luci-modulecache
          exit 0
          EOF

          cat > prerm.sh <<'EOF'
          #!/bin/sh
          /etc/init.d/luci-hev-socks5-tunnel-route stop 2>/dev/null || true
          /etc/init.d/luci-hev-socks5-tunnel-route disable 2>/dev/null || true
          exit 0
          EOF

          chmod 755 postinst.sh prerm.sh

          export PKG_DESC="LuCI front-end for the official hev-socks5-tunnel package with YAML rendering, status dashboard and route helper."

          export SOURCE_DATE_EPOCH=1704067200
          for ARCH in "${ARCHS[@]}"; do
            cat > nfpm_ipk.yaml <<EOF
          name: ${PKG_NAME}
          arch: ${ARCH}
          platform: linux
          version: ${PKG_VER}
          maintainer: HEV / OpenWrt integration
          description: "${PKG_DESC}"
          homepage: https://github.com/heiher/hev-socks5-tunnel
          contents:
            - src: ./pkgroot/etc/init.d/
              dst: /etc/init.d
              type: tree
            - src: ./pkgroot/usr/libexec/
              dst: /usr/libexec
              type: tree
            - src: ./pkgroot/usr/share/luci/menu.d/
              dst: /usr/share/luci/menu.d
              type: tree
            - src: ./pkgroot/usr/share/rpcd/acl.d/
              dst: /usr/share/rpcd/acl.d
              type: tree
            - src: ./pkgroot/www/luci-static/resources/view/hev-socks5-tunnel/
              dst: /www/luci-static/resources/view/hev-socks5-tunnel
              type: tree
            - src: ./pkgroot/etc/config/luci-hev-socks5-tunnel
              dst: /etc/config/luci-hev-socks5-tunnel
              type: config|noreplace
              file_info:
                mode: 0644
                mtime: 2024-01-01T00:00:00Z
          scripts:
            postinstall: ./postinst.sh
            preremove: ./prerm.sh
          EOF
            nfpm package --config nfpm_ipk.yaml --packager ipk --target "${PKG_NAME}_${PKG_VER}_${ARCH}.ipk"
          done

          unset SOURCE_DATE_EPOCH
          for ARCH in "${ARCHS[@]}"; do
            cat > nfpm_apk.yaml <<EOF
          name: ${PKG_NAME}
          arch: ${ARCH}
          platform: linux
          version: ${PKG_VER}
          maintainer: HEV / OpenWrt integration
          description: "${PKG_DESC}"
          homepage: https://github.com/heiher/hev-socks5-tunnel
          contents:
            - src: ./pkgroot/etc/init.d/
              dst: /etc/init.d
              type: tree
            - src: ./pkgroot/usr/libexec/
              dst: /usr/libexec
              type: tree
            - src: ./pkgroot/usr/share/luci/menu.d/
              dst: /usr/share/luci/menu.d
              type: tree
            - src: ./pkgroot/usr/share/rpcd/acl.d/
              dst: /usr/share/rpcd/acl.d
              type: tree
            - src: ./pkgroot/www/luci-static/resources/view/hev-socks5-tunnel/
              dst: /www/luci-static/resources/view/hev-socks5-tunnel
              type: tree
            - src: ./pkgroot/etc/config/luci-hev-socks5-tunnel
              dst: /etc/config/luci-hev-socks5-tunnel
              type: config|noreplace
              file_info:
                mode: 0644
          scripts:
            postinstall: ./postinst.sh
            preremove: ./prerm.sh
          EOF
            nfpm package --config nfpm_apk.yaml --packager apk --target "${PKG_NAME}_${PKG_VER}_${ARCH}.apk"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          files: |
            *.ipk
            *.apk
          name: Release ${{ env.VERSION }}
          tag_name: ${{ env.VERSION }}
          prerelease: false
          draft: false
