# ==============================================================================
# Build Script: luci-app-tun2proxy (AIO Senior Edition)
# Version: 1.0.0
# Targets: aarch64-unknown-linux-musl (OpenWrt/Alpine)
# ==============================================================================

name: Build and Release Tun2Proxy (AIO)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Target Version (e.g. v0.5.1 or branch name)'
        required: true
        default: 'main'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source (tun2proxy)
        uses: actions/checkout@v4
        with:
          repository: 'tun2proxy/tun2proxy'
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
          path: 'src'

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install System Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y upx-ucl dos2unix jq
          
          # Install cross-rs
          CROSS_TAG=$(curl -sL https://api.github.com/repos/cross-rs/cross/releases/latest | jq -r .tag_name)
          curl -sSfL "https://github.com/cross-rs/cross/releases/download/${CROSS_TAG}/cross-x86_64-unknown-linux-musl.tar.gz" | tar -xz
          sudo mv cross /usr/local/bin/
          
          # Install nFPM
          NFPM_TAG=$(curl -sL https://api.github.com/repos/goreleaser/nfpm/releases/latest | jq -r .tag_name)
          NFPM_VER=${NFPM_TAG#v}
          curl -sSfL "https://github.com/goreleaser/nfpm/releases/download/${NFPM_TAG}/nfpm_${NFPM_VER}_Linux_x86_64.tar.gz" | tar -xz
          sudo mv nfpm /usr/local/bin/

      - name: Build Binary (Aggressive Optimization)
        run: |
          cd src
          # Флаги оптимизации уровня telemt-wrt
          export CARGO_PROFILE_RELEASE_OPT_LEVEL="z"
          export CARGO_PROFILE_RELEASE_LTO="fat"
          export CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1
          export CARGO_PROFILE_RELEASE_PANIC="abort"
          export CARGO_PROFILE_RELEASE_STRIP=true
          
          cross build --release --target aarch64-unknown-linux-musl
          
          # Финальное сжатие UPX
          upx --ultra-brute --lzma target/aarch64-unknown-linux-musl/release/tun2proxy
          mv target/aarch64-unknown-linux-musl/release/tun2proxy ../tun2proxy-bin

      - name: Generate Scripts and Configuration
        run: |
          mkdir -p pkg/etc/config pkg/etc/init.d pkg/usr/share/luci/menu.d pkg/www/luci-static/resources/view

          # 1. UCI Config
          cat << 'EOF' > pkg/etc/config/tun2proxy
          config tun2proxy 'main'
              option enabled '0'
              option proxy 'socks5://192.168.11.189:10808'
              option interface 'tun0'
              option default_route '0'
          EOF

          # 2. Init Script with Routing Anti-loop and Full Redirect logic
          cat << 'EOF' > pkg/etc/init.d/tun2proxy
          #!/bin/sh /etc/rc.common

          START=95
          USE_PROCD=1

          start_service() {
              config_load tun2proxy
              config_get_bool enabled main enabled 0
              [ "$enabled" -eq 0 ] && return

              config_get proxy main proxy
              config_get interface main interface "tun0"

              procd_open_instance
              procd_set_param command /usr/bin/tun2proxy --proxy "$proxy" --interface "$interface"
              procd_set_param respawn
              procd_set_param stdout 1
              procd_set_param stderr 1
              procd_close_instance
          }

          service_started() {
              config_load tun2proxy
              config_get interface main interface "tun0"
              config_get_bool dr main default_route 0
              config_get proxy main proxy

              # Wait for interface
              local timeout=10
              while [ ! -d "/sys/class/net/$interface" ] && [ $timeout -gt 0 ]; do
                  sleep 1
                  timeout=$((timeout - 1))
              done

              [ ! -d "/sys/class/net/$interface" ] && return
              ip link set dev "$interface" up

              if [ "$dr" -eq 1 ]; then
                  # Anti-loop protection: resolve proxy host and route via original gateway
                  local phost=$(echo "$proxy" | sed -E 's/.*:\/\/([^:]+).*/\1/')
                  local gw=$(ip route show default | awk '/default/ {print $3}')
                  local dev=$(ip route show default | awk '/default/ {print $5}')
                  
                  if [ -n "$phost" ] && [ -n "$gw" ]; then
                      ip route add "$phost" via "$gw" dev "$dev" 2>/dev/null
                  fi

                  # Route all traffic through TUN (two halves method)
                  ip route add 0.0.0.0/1 dev "$interface"
                  ip route add 128.0.0.0/1 dev "$interface"
              fi
          }

          stop_service() {
              config_load tun2proxy
              config_get interface main interface "tun0"
              ip route del 0.0.0.0/1 dev "$interface" 2>/dev/null
              ip route del 128.0.0.0/1 dev "$interface" 2>/dev/null
          }
          EOF

          # 3. LuCI Menu Definition
          cat << 'EOF' > pkg/usr/share/luci/menu.d/luci-app-tun2proxy.json
          {
              "admin/services/tun2proxy": {
                  "title": "Tun2Proxy",
                  "action": { "type": "view", "path": "tun2proxy/config" },
                  "depends": { "acl": [ "luci-app-tun2proxy" ] }
              }
          }
          EOF

          # 4. LuCI View (Javascript)
          cat << 'EOF' > pkg/www/luci-static/resources/view/tun2proxy/config.js
          'use strict';
          'use ui';

          return L.view.extend({
              render: function() {
                  let m, s, o;
                  m = new form.Map('tun2proxy', _('Tun2Proxy'), _('Transparent L3 Tunneling (Rust)'));

                  s = m.section(form.TypedSection, 'main', _('Service Status'));
                  s.anonymous = true;
                  s.render = function() {
                      return L.resolveDefault(L.getProcessList('tun2proxy'), []).then(L.bind(function(res) {
                          let running = res.length > 0;
                          return E('div', { 'class': 'cbi-section' }, [
                              E('p', {}, [
                                  running ? E('span', { 'style': 'color:green;font-weight:bold' }, _('RUNNING')) :
                                            E('span', { 'style': 'color:red;font-weight:bold' }, _('NOT RUNNING'))
                              ])
                          ]);
                      }, this));
                  };

                  s = m.section(form.TypedSection, 'main', _('Settings'));
                  s.anonymous = true;
                  s.option(form.Flag, 'enabled', _('Enable Service'));
                  o = s.option(form.Value, 'proxy', _('Proxy URL'));
                  o.placeholder = 'socks5://192.168.11.189:10808';
                  s.option(form.Value, 'interface', _('TUN Interface')).placeholder = 'tun0';
                  s.option(form.Flag, 'default_route', _('Default Route'), _('Redirect all traffic through TUN'));

                  return m.render();
              }
          });
          EOF

          # Final fixes
          chmod 755 pkg/etc/init.d/tun2proxy
          dos2unix pkg/etc/init.d/tun2proxy pkg/etc/config/tun2proxy

      - name: Build Packages (nFPM)
        run: |
          VER_RAW=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
          VERSION=$(echo $VER_RAW | sed 's/^v//; s/main/1.0.0/')
          
          export PKG_DESC="Highly optimized Rust TUN-to-SOCKS/HTTP proxy for OpenWrt. Includes LuCI interface."

          # nFPM Config
          cat << EOF > nfpm.yaml
          name: luci-app-tun2proxy
          arch: aarch64_generic
          platform: linux
          version: ${VERSION}
          description: "${PKG_DESC}"
          maintainer: "Arikusey"
          depends:
            - kmod-tun
            - ip-full
            - ca-bundle
          contents:
            - src: ./tun2proxy-bin
              dst: /usr/bin/tun2proxy
              file_info: { mode: 0755 }
            - src: ./pkg
              dst: /
          scripts:
            postinstall: |
              #!/bin/sh
              [ -n "\${IPKG_INSTROOT}" ] || {
                  /etc/init.d/tun2proxy enable
                  rm -f /tmp/luci-indexcache /tmp/luci-modulecache
                  exit 0
              }
          EOF

          nfpm pkg --config nfpm.yaml --packager ipk --target "luci-app-tun2proxy_${VERSION}_aarch64.ipk"
          nfpm pkg --config nfpm.yaml --packager apk --target "luci-app-tun2proxy_${VERSION}_aarch64.apk"

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.ipk
            *.apk
          tag_name: ${{ env.VERSION }}-${{ github.run_number }}
          name: Release ${{ env.VERSION }}
          draft: false
          prerelease: false
