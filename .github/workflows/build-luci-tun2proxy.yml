name: Build and Release Tun2Proxy (AIO) v2

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Git ref to build (tag, branch or commit SHA)'
        required: true
        default: 'master'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      TARGET: aarch64-unknown-linux-musl
      PKG_NAME: luci-app-tun2proxy
      TUN_NAME: tun0

    steps:
      - name: Checkout Source (tun2proxy)
        uses: actions/checkout@v4
        with:
          repository: tun2proxy/tun2proxy
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
          path: src
          fetch-depth: 1

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src

      - name: Install System Dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y musl-tools upx-ucl dos2unix jq curl tar xz-utils

          cargo install cross --locked --version 0.2.5

          NFPM_VER="2.43.1"
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VER}/nfpm_${NFPM_VER}_Linux_x86_64.tar.gz" | tar -xz
          sudo install -m 0755 nfpm /usr/local/bin/nfpm

      - name: Resolve Version Metadata
        shell: bash
        run: |
          set -euo pipefail

          REF_RAW="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}"
          VERSION="${REF_RAW#v}"

          if [[ -z "${VERSION}" || "${VERSION}" == "master" || "${VERSION}" == "main" ]]; then
            VERSION="0.0.0-dev.${GITHUB_RUN_NUMBER}"
          fi

          RELEASE_TAG="tun2proxy-${VERSION}-${GITHUB_RUN_NUMBER}"

          {
            echo "REF_RAW=${REF_RAW}"
            echo "VERSION=${VERSION}"
            echo "RELEASE_TAG=${RELEASE_TAG}"
          } >> "$GITHUB_ENV"

      - name: Build Binaries (Aggressive Optimization)
        shell: bash
        working-directory: src
        env:
          CARGO_PROFILE_RELEASE_OPT_LEVEL: z
          CARGO_PROFILE_RELEASE_LTO: fat
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 1
          CARGO_PROFILE_RELEASE_PANIC: abort
          CARGO_PROFILE_RELEASE_STRIP: symbols
          RUSTFLAGS: -C strip=symbols -C debuginfo=0
        run: |
          set -euxo pipefail

          # Build both the main tunnel binary and the UDPGW helper binary.
          cross build --release --target "${TARGET}" --bin tun2proxy-bin --bin udpgw-server

          T2P_BIN="target/${TARGET}/release/tun2proxy-bin"
          UDPGW_BIN="target/${TARGET}/release/udpgw-server"

          test -f "${T2P_BIN}"
          test -f "${UDPGW_BIN}"

          # UPX compression is best-effort and should not fail the workflow.
          upx --best --lzma "${T2P_BIN}" || true
          upx --best --lzma "${UDPGW_BIN}" || true

          install -m 0755 "${T2P_BIN}" "${GITHUB_WORKSPACE}/tun2proxy-bin"
          install -m 0755 "${UDPGW_BIN}" "${GITHUB_WORKSPACE}/udpgw-server"

      - name: Generate Package Files
        shell: bash
        run: |
          set -euxo pipefail

          PKGROOT="${GITHUB_WORKSPACE}/pkgroot"

          mkdir -p \
            "${PKGROOT}/etc/config" \
            "${PKGROOT}/etc/init.d" \
            "${PKGROOT}/usr/share/luci/menu.d" \
            "${PKGROOT}/usr/share/rpcd/acl.d" \
            "${PKGROOT}/www/luci-static/resources/view/tun2proxy"

          cat > "${PKGROOT}/etc/config/tun2proxy" <<'EOF'
          config tun2proxy 'main'
              option enabled '0'
              option proxy 'socks5://127.0.0.1:1080'
              option default_route '0'
              option udp_over_tcp '0'
              option run_local_udpgw '0'
              option udpgw_server '127.0.0.1:7300'
              option udpgw_listen '127.0.0.1:7300'
              list route_include '192.168.50.0/24'
              list route_exclude '192.168.11.0/24'
          EOF

          cat > "${PKGROOT}/etc/init.d/tun2proxy" <<'EOF'
          #!/bin/sh /etc/rc.common

          START=95
          STOP=15
          USE_PROCD=1

          SERVICE_NAME="tun2proxy"
          BIN_PATH="/usr/bin/tun2proxy"
          UDPGW_BIN="/usr/bin/udpgw-server"
          TUN_IF="tun0"
          PIDFILE_MAIN="/var/run/tun2proxy.pid"
          PIDFILE_UDPGW="/var/run/tun2proxy-udpgw.pid"

          EXTRA_COMMANDS="status"
          EXTRA_HELP="    status   Show current service state"

          proxy_host() {
              local proxy="$1"

              proxy="${proxy#*://}"
              proxy="${proxy#*@}"
              proxy="${proxy%%/*}"

              case "$proxy" in
                  \[*\]:*)
                      proxy="${proxy#\[}"
                      proxy="${proxy%%\]*}"
                  ;;
                  \[*\])
                      proxy="${proxy#\[}"
                      proxy="${proxy%%\]*}"
                  ;;
                  *:*)
                      proxy="${proxy%%:*}"
                  ;;
              esac

              printf '%s\n' "$proxy"
          }

          is_ipv4() {
              echo "$1" | grep -Eq '^(25[0-5]|2[0-4][0-9]|1?[0-9]?[0-9])(\.(25[0-5]|2[0-4][0-9]|1?[0-9]?[0-9])){3}$'
          }

          is_ipv4_cidr() {
              local v="$1"
              local ip mask

              case "$v" in
                  */*)
                      ip="${v%/*}"
                      mask="${v#*/}"
                      is_ipv4 "$ip" || return 1
                      echo "$mask" | grep -Eq '^(3[0-2]|[12]?[0-9])$' || return 1
                      return 0
                  ;;
                  *)
                      is_ipv4 "$v"
                      return $?
                  ;;
              esac
          }

          resolve_ipv4() {
              local host="$1"
              local ip=""

              [ -n "$host" ] || return 1

              if is_ipv4 "$host"; then
                  printf '%s\n' "$host"
                  return 0
              fi

              if command -v resolveip >/dev/null 2>&1; then
                  ip="$(resolveip -4 "$host" 2>/dev/null | awk 'NR==1{print $1}')"
                  [ -n "$ip" ] && {
                      printf '%s\n' "$ip"
                      return 0
                  }
              fi

              if command -v getent >/dev/null 2>&1; then
                  ip="$(getent ahostsv4 "$host" 2>/dev/null | awk 'NR==1{print $1}')"
                  [ -n "$ip" ] && {
                      printf '%s\n' "$ip"
                      return 0
                  }
              fi

              if command -v nslookup >/dev/null 2>&1; then
                  ip="$(nslookup "$host" 2>/dev/null | awk '/^Address [0-9]+: /{print $3; exit} /^Address: /{print $2; exit}')"
                  echo "$ip" | grep -Eq '^(25[0-5]|2[0-4][0-9]|1?[0-9]?[0-9])(\.(25[0-5]|2[0-4][0-9]|1?[0-9]?[0-9])){3}$' && {
                      printf '%s\n' "$ip"
                      return 0
                  }
              fi

              return 1
          }

          get_route_dev_for_ip() {
              local ip="$1"
              ip route get "$ip" 2>/dev/null | awk '{
                  for (i = 1; i <= NF; i++) {
                      if ($i == "dev") {
                          print $(i + 1)
                          exit
                      }
                  }
              }'
          }

          get_route_via_for_ip() {
              local ip="$1"
              ip route get "$ip" 2>/dev/null | awk '{
                  for (i = 1; i <= NF; i++) {
                      if ($i == "via") {
                          print $(i + 1)
                          exit
                      }
                  }
              }'
          }

          add_bypass_route() {
              local proxy host ip4 via dev

              config_load tun2proxy
              config_get proxy main proxy

              host="$(proxy_host "$proxy")"
              [ -n "$host" ] || return 0

              ip4="$(resolve_ipv4 "$host" 2>/dev/null || true)"
              [ -n "$ip4" ] || {
                  logger -t "$SERVICE_NAME" "Unable to resolve proxy host '$host' for bypass route"
                  return 0
              }

              dev="$(get_route_dev_for_ip "$ip4")"
              via="$(get_route_via_for_ip "$ip4")"

              [ -n "$dev" ] || {
                  logger -t "$SERVICE_NAME" "Unable to determine route device for proxy endpoint '$ip4'"
                  return 0
              }

              if [ -n "$via" ]; then
                  ip route replace "$ip4" via "$via" dev "$dev" 2>/dev/null || true
              else
                  ip route replace "$ip4" dev "$dev" 2>/dev/null || true
              fi
          }

          del_bypass_route() {
              local proxy host ip4

              config_load tun2proxy
              config_get proxy main proxy

              host="$(proxy_host "$proxy")"
              ip4="$(resolve_ipv4 "$host" 2>/dev/null || true)"

              [ -n "$ip4" ] || return 0
              ip route del "$ip4" 2>/dev/null || true
          }

          add_default_routes() {
              ip route replace 0.0.0.0/1 dev "$TUN_IF" 2>/dev/null || true
              ip route replace 128.0.0.0/1 dev "$TUN_IF" 2>/dev/null || true
          }

          del_default_routes() {
              ip route del 0.0.0.0/1 dev "$TUN_IF" 2>/dev/null || true
              ip route del 128.0.0.0/1 dev "$TUN_IF" 2>/dev/null || true
          }

          _apply_include_route() {
              local entry="$1"

              is_ipv4_cidr "$entry" || {
                  logger -t "$SERVICE_NAME" "Ignoring invalid route_include entry: $entry"
                  return 0
              }

              ip route replace "$entry" dev "$TUN_IF" 2>/dev/null || true
          }

          apply_include_routes() {
              config_list_foreach main route_include _apply_include_route
          }

          _remove_include_route() {
              local entry="$1"

              is_ipv4_cidr "$entry" || return 0
              ip route del "$entry" dev "$TUN_IF" 2>/dev/null || true
          }

          remove_include_routes() {
              config_list_foreach main route_include _remove_include_route
          }

          _apply_exclude_route() {
              local entry="$1"
              local probe_ip dev via

              is_ipv4_cidr "$entry" || {
                  logger -t "$SERVICE_NAME" "Ignoring invalid route_exclude entry: $entry"
                  return 0
              }

              probe_ip="${entry%/*}"
              dev="$(get_route_dev_for_ip "$probe_ip")"
              via="$(get_route_via_for_ip "$probe_ip")"

              [ -n "$dev" ] || return 0

              if [ -n "$via" ]; then
                  ip route replace "$entry" via "$via" dev "$dev" 2>/dev/null || true
              else
                  ip route replace "$entry" dev "$dev" 2>/dev/null || true
              fi
          }

          apply_exclude_routes() {
              config_list_foreach main route_exclude _apply_exclude_route
          }

          _remove_exclude_route() {
              local entry="$1"

              is_ipv4_cidr "$entry" || return 0
              ip route del "$entry" 2>/dev/null || true
          }

          remove_exclude_routes() {
              config_list_foreach main route_exclude _remove_exclude_route
          }

          wait_and_setup_routes() {
              local default_route timeout=20

              config_load tun2proxy
              config_get_bool default_route main default_route 0

              while [ "$timeout" -gt 0 ]; do
                  if [ -d "/sys/class/net/$TUN_IF" ]; then
                      ip link set dev "$TUN_IF" up 2>/dev/null || true

                      if ip link show "$TUN_IF" 2>/dev/null | grep -qv 'state DOWN'; then
                          add_bypass_route

                          if [ "$default_route" -eq 1 ]; then
                              add_default_routes
                          fi

                          apply_include_routes
                          apply_exclude_routes

                          logger -t "$SERVICE_NAME" "TUN device '$TUN_IF' is operational, routes applied"
                          return 0
                      fi
                  fi

                  sleep 1
                  timeout=$((timeout - 1))
              done

              logger -t "$SERVICE_NAME" "TUN device '$TUN_IF' did not become operational in time"
              return 0
          }

          start_local_udpgw() {
              local run_local_udpgw udp_over_tcp udpgw_listen

              config_load tun2proxy
              config_get_bool run_local_udpgw main run_local_udpgw 0
              config_get_bool udp_over_tcp main udp_over_tcp 0
              config_get udpgw_listen main udpgw_listen "127.0.0.1:7300"

              [ "$udp_over_tcp" -eq 1 ] || return 0
              [ "$run_local_udpgw" -eq 1 ] || return 0
              [ -x "$UDPGW_BIN" ] || return 1
              [ -n "$udpgw_listen" ] || return 1

              procd_open_instance udpgw
              procd_set_param command "$UDPGW_BIN" -l "$udpgw_listen"
              procd_set_param pidfile "$PIDFILE_UDPGW"
              procd_set_param respawn 3600 5 5
              procd_set_param stdout 1
              procd_set_param stderr 1
              procd_close_instance
          }

          start_main_tunnel() {
              local enabled proxy udp_over_tcp udpgw_server run_local_udpgw udpgw_listen

              config_load tun2proxy
              config_get_bool enabled main enabled 0
              config_get proxy main proxy
              config_get_bool udp_over_tcp main udp_over_tcp 0
              config_get_bool run_local_udpgw main run_local_udpgw 0
              config_get udpgw_server main udpgw_server
              config_get udpgw_listen main udpgw_listen "127.0.0.1:7300"

              [ "$enabled" -eq 1 ] || return 0
              [ -n "$proxy" ] || {
                  logger -t "$SERVICE_NAME" "Proxy URL is empty"
                  return 1
              }

              if [ "$udp_over_tcp" -eq 1 ] && [ "$run_local_udpgw" -eq 1 ] && [ -z "$udpgw_server" ]; then
                  udpgw_server="$udpgw_listen"
              fi

              procd_open_instance main
              procd_set_param command "$BIN_PATH" --tun "$TUN_IF" --proxy "$proxy"
              [ "$udp_over_tcp" -eq 1 ] && [ -n "$udpgw_server" ] && procd_append_param command --udpgw-server "$udpgw_server"
              procd_set_param pidfile "$PIDFILE_MAIN"
              procd_set_param respawn 3600 5 5
              procd_set_param stdout 1
              procd_set_param stderr 1
              procd_close_instance

              # Route setup is detached so service startup remains responsive.
              wait_and_setup_routes &
          }

          start_service() {
              start_local_udpgw
              start_main_tunnel
          }

          stop_service() {
              del_default_routes
              del_bypass_route
              remove_include_routes
              remove_exclude_routes
          }

          reload_service() {
              stop
              start
          }

          service_triggers() {
              procd_add_reload_trigger tun2proxy
          }

          status() {
              local main_pid="-"
              local udpgw_pid="-"
              local tun_state="missing"

              [ -f "$PIDFILE_MAIN" ] && main_pid="$(cat "$PIDFILE_MAIN" 2>/dev/null || echo "-")"
              [ -f "$PIDFILE_UDPGW" ] && udpgw_pid="$(cat "$PIDFILE_UDPGW" 2>/dev/null || echo "-")"
              [ -d "/sys/class/net/$TUN_IF" ] && tun_state="present"

              if procd_running "$SERVICE_NAME"; then
                  echo "running main_pid=${main_pid} udpgw_pid=${udpgw_pid} tun=${tun_state}"
                  return 0
              fi

              echo "stopped main_pid=${main_pid} udpgw_pid=${udpgw_pid} tun=${tun_state}"
              return 1
          }
          EOF

          cat > "${PKGROOT}/usr/share/luci/menu.d/luci-app-tun2proxy.json" <<'EOF'
          {
            "admin/services/tun2proxy": {
              "title": "Tun2Proxy",
              "order": 90,
              "action": {
                "type": "view",
                "path": "tun2proxy/config"
              },
              "depends": {
                "acl": [ "luci-app-tun2proxy" ]
              }
            }
          }
          EOF

          cat > "${PKGROOT}/usr/share/rpcd/acl.d/luci-app-tun2proxy.json" <<'EOF'
          {
            "luci-app-tun2proxy": {
              "description": "Grant access to Tun2Proxy configuration, service control and runtime diagnostics",
              "read": {
                "uci": [ "tun2proxy" ],
                "ubus": {
                  "service": [ "list" ],
                  "file": [ "stat", "read", "exec" ]
                },
                "file": {
                  "/sys/class/net/tun0": [ "stat" ],
                  "/var/run/tun2proxy.pid": [ "read" ],
                  "/var/run/tun2proxy-udpgw.pid": [ "read" ],
                  "/proc/meminfo": [ "read" ],
                  "/proc/%": [ "read" ],
                  "/sbin/logread": [ "exec" ]
                }
              },
              "write": {
                "uci": [ "tun2proxy" ],
                "ubus": {
                  "luci": [ "setInitAction" ]
                }
              }
            }
          }
          EOF

          cat > "${PKGROOT}/www/luci-static/resources/view/tun2proxy/config.js" <<'EOF'
          'use strict';
          'require view';
          'require form';
          'require rpc';
          'require poll';
          'require ui';
          'require uci';
          'require fs';

          var callServiceList = rpc.declare({
              object: 'service',
              method: 'list',
              params: [ 'name' ],
              expect: { '': {} }
          });

          var callInitAction = rpc.declare({
              object: 'luci',
              method: 'setInitAction',
              params: [ 'name', 'action' ],
              expect: { result: false }
          });

          function isValidIPv4(s) {
              return /^(25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)(\.(25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)){3}$/.test(String(s || ''));
          }

          function isValidIPv4CIDR(s) {
              var v = String(s || '');
              var m = v.match(/^(.+)\/(\d{1,2})$/);

              if (!m)
                  return isValidIPv4(v);

              return isValidIPv4(m[1]) && (+m[2] >= 0 && +m[2] <= 32);
          }

          function readInstances(reply) {
              var svc = (reply || {}).tun2proxy || {};
              var instances = svc.instances || {};
              var main = instances.main || {};
              var udpgw = instances.udpgw || {};

              return {
                  mainRunning: main.running === true || !!main.pid,
                  mainPid: main.pid || null,
                  udpgwRunning: udpgw.running === true || !!udpgw.pid,
                  udpgwPid: udpgw.pid || null
              };
          }

          function pidFromText(data) {
              var s = String(data || '').trim();
              return /^\d+$/.test(s) ? s : null;
          }

          function badge(label, ok) {
              return '<span style="display:inline-block;padding:2px 8px;border-radius:999px;font-weight:600;color:#fff;background:' +
                  (ok ? '#16a34a' : '#dc2626') + '">' + label + '</span>';
          }

          function formatKBToMB(kb) {
              var n = parseInt(kb, 10);
              if (isNaN(n) || n < 0)
                  return '-';
              return (n / 1024).toFixed(1) + ' MB';
          }

          return view.extend({
              _statusNode: null,
              _logNode: null,
              _actionNode: null,
              _buttons: [],
              _pollRegistered: false,

              load: function() {
                  return Promise.all([
                      uci.load('tun2proxy')
                  ]);
              },

              readProcStatusValue: function(pid, fieldName) {
                  if (!pid)
                      return Promise.resolve(null);

                  return L.resolveDefault(fs.read_direct('/proc/' + pid + '/status'), '').then(function(txt) {
                      var m = String(txt || '').match(new RegExp('^' + fieldName + ':\\s+([0-9]+)\\s+kB$', 'm'));
                      return m ? m[1] : null;
                  });
              },

              readMemAvailable: function() {
                  return L.resolveDefault(fs.read_direct('/proc/meminfo'), '').then(function(txt) {
                      var m = String(txt || '').match(/^MemAvailable:\s+([0-9]+)\s+kB$/m);
                      return m ? m[1] : null;
                  });
              },

              fetchRuntime: function() {
                  return Promise.all([
                      L.resolveDefault(callServiceList('tun2proxy'), {}),
                      L.resolveDefault(fs.stat('/sys/class/net/tun0'), null),
                      L.resolveDefault(fs.read_direct('/var/run/tun2proxy.pid'), ''),
                      L.resolveDefault(fs.read_direct('/var/run/tun2proxy-udpgw.pid'), '')
                  ]).then(L.bind(function(res) {
                      var state = readInstances(res[0]);
                      var tunStat = res[1];
                      var mainPidFile = pidFromText(res[2]);
                      var udpgwPidFile = pidFromText(res[3]);

                      if (!state.mainPid && mainPidFile)
                          state.mainPid = mainPidFile;
                      if (!state.mainRunning && mainPidFile)
                          state.mainRunning = true;

                      if (!state.udpgwPid && udpgwPidFile)
                          state.udpgwPid = udpgwPidFile;
                      if (!state.udpgwRunning && udpgwPidFile)
                          state.udpgwRunning = true;

                      return Promise.all([
                          Promise.resolve(state),
                          Promise.resolve(tunStat),
                          this.readProcStatusValue(state.mainPid, 'VmRSS'),
                          this.readProcStatusValue(state.udpgwPid, 'VmRSS'),
                          this.readMemAvailable()
                      ]);
                  }, this)).then(function(res) {
                      return {
                          state: res[0],
                          tun: res[1],
                          mainRssKb: res[2],
                          udpgwRssKb: res[3],
                          freeMemKb: res[4]
                      };
                  });
              },

              renderStatusHtml: function(runtime) {
                  var state = runtime.state;
                  var tunObj = runtime.tun;
                  var mainPid = state.mainPid ? String(state.mainPid) : '-';
                  var udpgwPid = state.udpgwPid ? String(state.udpgwPid) : '-';
                  var tunText = tunObj ? _('Present') : _('Missing');

                  return [
                      '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;align-items:stretch">',
                        '<div style="padding:10px;border:1px solid #d1d5db;border-radius:10px;background:#fff">',
                          '<div style="font-size:12px;color:#6b7280;margin-bottom:6px">' + _('Main service') + '</div>',
                          '<div>' + badge(state.mainRunning ? _('Running') : _('Stopped'), state.mainRunning) + '</div>',
                          '<div style="margin-top:8px"><strong>' + _('PID') + ':</strong> ' + mainPid + '</div>',
                          '<div style="margin-top:4px"><strong>' + _('RSS') + ':</strong> ' + formatKBToMB(runtime.mainRssKb) + '</div>',
                        '</div>',
                        '<div style="padding:10px;border:1px solid #d1d5db;border-radius:10px;background:#fff">',
                          '<div style="font-size:12px;color:#6b7280;margin-bottom:6px">' + _('Local UdpGW') + '</div>',
                          '<div>' + badge(state.udpgwRunning ? _('Running') : _('Stopped'), state.udpgwRunning) + '</div>',
                          '<div style="margin-top:8px"><strong>' + _('PID') + ':</strong> ' + udpgwPid + '</div>',
                          '<div style="margin-top:4px"><strong>' + _('RSS') + ':</strong> ' + formatKBToMB(runtime.udpgwRssKb) + '</div>',
                        '</div>',
                        '<div style="padding:10px;border:1px solid #d1d5db;border-radius:10px;background:#fff">',
                          '<div style="font-size:12px;color:#6b7280;margin-bottom:6px">' + _('Tunnel interface') + '</div>',
                          '<div><strong>tun0:</strong> ' + tunText + '</div>',
                          '<div style="margin-top:8px"><strong>' + _('Free RAM') + ':</strong> ' + formatKBToMB(runtime.freeMemKb) + '</div>',
                        '</div>',
                      '</div>'
                  ].join('');
              },

              refreshStatus: function() {
                  if (!this._statusNode)
                      return Promise.resolve();

                  return this.fetchRuntime().then(L.bind(function(runtime) {
                      this._statusNode.innerHTML = this.renderStatusHtml(runtime);
                  }, this)).catch(function() {});
              },

              refreshLogs: function() {
                  if (!this._logNode)
                      return Promise.resolve();

                  this._logNode.value = _('Refreshing logs...');

                  return L.resolveDefault(fs.exec_direct('/sbin/logread', ['-e', 'tun2proxy'], 'text'), '')
                      .then(L.bind(function(output) {
                          this._logNode.value = String(output || '').trim() || _('No tun2proxy log entries yet.');
                          this._logNode.scrollTop = this._logNode.scrollHeight;
                      }, this))
                      .catch(L.bind(function(err) {
                          this._logNode.value = (err && err.message) ? err.message : _('Unable to read logs.');
                      }, this));
              },

              setActionState: function(busy, text) {
                  if (this._actionNode)
                      this._actionNode.textContent = text || '';

                  this._buttons.forEach(function(btn) {
                      if (!btn)
                          return;
                      btn.disabled = !!busy;
                  });
              },

              handleServiceAction: function(action) {
                  return ui.createHandlerFn(this, function() {
                      this.setActionState(true, _('Executing action: ') + action + ' ...');

                      return callInitAction('tun2proxy', action)
                          .then(L.bind(function() {
                              return new Promise(function(resolve) { window.setTimeout(resolve, 1500); });
                          }, this))
                          .then(L.bind(function() {
                              return Promise.all([
                                  this.refreshStatus(),
                                  this.refreshLogs()
                              ]);
                          }, this))
                          .then(L.bind(function() {
                              this.setActionState(false, _('Last action completed: ') + action);
                          }, this))
                          .catch(L.bind(function(err) {
                              this.setActionState(false, (err && err.message) ? err.message : _('Operation failed'));
                              ui.addNotification(null, E('p', {}, (err && err.message) ? err.message : _('Operation failed')));
                          }, this));
                  });
              },

              render: function() {
                  var m, s, o;
                  var self = this;

                  m = new form.Map('tun2proxy', _('Tun2Proxy'),
                      _('Lightweight control page for tun2proxy with live runtime state, process IDs, memory usage, tun0 presence, validated route lists and optional local UDPGW integration.'));

                  s = m.section(form.TypedSection, 'tun2proxy', _('Live Status'));
                  s.anonymous = true;

                  o = s.option(form.DummyValue, '_status', _('Runtime state'),
                      _('Shows service state, process IDs, current memory usage, tun0 presence and available RAM. This block is updated through lightweight runtime polling instead of full page re-rendering.'));
                  o.rawhtml = true;
                  o.cfgvalue = function() {
                      return '<div data-tun2proxy-status="1">' + _('Loading status...') + '</div>';
                  };

                  o = s.option(form.Button, '_start');
                  o.title = _('Start service');
                  o.description = _('Start the package service immediately. If local UdpGW is enabled, it is started first, followed by tun2proxy.');
                  o.inputtitle = _('Start');
                  o.inputstyle = 'apply';
                  o.onclick = this.handleServiceAction('start');

                  o = s.option(form.Button, '_stop');
                  o.title = _('Stop service');
                  o.description = _('Stop the package service immediately and remove temporary tun0 route overrides.');
                  o.inputtitle = _('Stop');
                  o.inputstyle = 'remove';
                  o.onclick = this.handleServiceAction('stop');

                  o = s.option(form.Button, '_restart');
                  o.title = _('Restart service');
                  o.description = _('Restart both managed processes and refresh runtime state so you can verify that a real restart happened.');
                  o.inputtitle = _('Restart');
                  o.inputstyle = 'apply';
                  o.onclick = this.handleServiceAction('restart');

                  o = s.option(form.DummyValue, '_action_state', _('Action result'),
                      _('Shows the latest button action result without requiring a page reload.'));
                  o.rawhtml = true;
                  o.cfgvalue = function() {
                      return '<div data-tun2proxy-action="1" style="min-height:1.4em;color:#6b7280">' + _('No action executed yet.') + '</div>';
                  };

                  s = m.section(form.TypedSection, 'tun2proxy', _('Configuration'));
                  s.anonymous = true;

                  o = s.option(form.Flag, 'enabled', _('Enable service'),
                      _('Enable automatic start during boot. This does not prevent you from using the Start button for temporary manual runs.'));
                  o.rmempty = false;

                  o = s.option(form.Value, 'proxy', _('Proxy URL'),
                      _('Accepts localhost, LAN addresses and resolvable hostnames. Examples: socks5://127.0.0.1:1080, socks5://192.168.1.20:1080, socks5://ts-exit.tailnet:1080.'));
                  o.datatype = 'string';
                  o.rmempty = false;
                  o.placeholder = 'socks5://127.0.0.1:1080';

                  o = s.option(form.Flag, 'default_route', _('Default route to tun0'),
                      _('Redirect all IPv4 traffic through tun0 while keeping the configured proxy endpoint reachable through its original route.'));
                  o.rmempty = false;

                  o = s.option(form.DynamicList, 'route_include', _('IPv4 subnets via tun0'),
                      _('Add specific IPv4 addresses or CIDR subnets that should be routed through tun0. Each entry is validated before saving and again before route application.'));
                  o.datatype = 'or(ip4addr, cidr4)';
                  o.rmempty = true;
                  o.validate = function(section_id, value) {
                      var list = Array.isArray(value) ? value : [ value ];
                      var i;

                      for (i = 0; i < list.length; i++) {
                          if (String(list[i] || '').length === 0)
                              continue;
                          if (!isValidIPv4CIDR(list[i]))
                              return _('Each entry must be a valid IPv4 address or IPv4 CIDR subnet.');
                      }

                      return true;
                  };

                  o = s.option(form.DynamicList, 'route_exclude', _('IPv4 subnets bypass tun0'),
                      _('Add IPv4 addresses or CIDR subnets that must stay on the original path even when tun0 routing is active. Useful for LAN management ranges, local services, or proxy-side networks.'));
                  o.datatype = 'or(ip4addr, cidr4)';
                  o.rmempty = true;
                  o.validate = function(section_id, value) {
                      var list = Array.isArray(value) ? value : [ value ];
                      var i;

                      for (i = 0; i < list.length; i++) {
                          if (String(list[i] || '').length === 0)
                              continue;
                          if (!isValidIPv4CIDR(list[i]))
                              return _('Each entry must be a valid IPv4 address or IPv4 CIDR subnet.');
                      }

                      return true;
                  };

                  o = s.option(form.Flag, 'udp_over_tcp', _('Enable UDP-over-TCP'),
                      _('Enable the UdpGW transport for UDP-like traffic over TCP. This requires a reachable UdpGW server. Enable the local helper below only when your proxy path can actually reach that local address.'));
                  o.rmempty = false;

                  o = s.option(form.Value, 'udpgw_server', _('UdpGW server address'),
                      _('Address passed to tun2proxy as host:port. Use a remote VPS address for the standard upstream design, or a local address only when your proxy setup is local and can reach it.'));
                  o.datatype = 'hostport';
                  o.rmempty = true;
                  o.placeholder = '127.0.0.1:7300';
                  o.depends('udp_over_tcp', '1');

                  o = s.option(form.Flag, 'run_local_udpgw', _('Run local UdpGW server'),
                      _('Start the bundled udpgw-server together with tun2proxy. This is only useful when your chosen UdpGW server address should be served locally on the router.'));
                  o.rmempty = false;
                  o.depends('udp_over_tcp', '1');

                  o = s.option(form.Value, 'udpgw_listen', _('Local UdpGW listen address'),
                      _('Bind address for the bundled local UdpGW helper in host:port form, for example 127.0.0.1:7300.'));
                  o.datatype = 'hostport';
                  o.rmempty = false;
                  o.placeholder = '127.0.0.1:7300';
                  o.depends('run_local_udpgw', '1');

                  s = m.section(form.TypedSection, 'tun2proxy', _('Diagnostics'));
                  s.anonymous = true;

                  o = s.option(form.DummyValue, '_diag',
                      _('Live log output'),
                      _('Collapsed log viewer for quick diagnostics. It runs logread only when refreshed manually or after service actions, reducing CPU and browser load.'));
                  o.rawhtml = true;
                  o.cfgvalue = function() {
                      return [
                          '<details style="margin-top:4px">',
                          '<summary style="cursor:pointer;font-weight:600">' + _('Show tun2proxy logs') + '</summary>',
                          '<div style="margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">',
                          '<button type="button" class="btn cbi-button cbi-button-action" data-tun2proxy-refresh-logs="1">' + _('Refresh logs') + '</button>',
                          '<span style="color:#6b7280">' + _('Runs: logread -e tun2proxy') + '</span>',
                          '</div>',
                          '<textarea data-tun2proxy-logs="1" readonly="readonly" wrap="off" style="margin-top:10px;width:100%;min-height:220px;font-family:monospace;background:#111827;color:#e5e7eb;border:1px solid #374151;border-radius:8px;padding:10px"></textarea>',
                          '</details>'
                      ].join('');
                  };

                  return m.render().then(function(nodes) {
                      self._statusNode = nodes.querySelector('[data-tun2proxy-status="1"]');
                      self._actionNode = nodes.querySelector('[data-tun2proxy-action="1"]');
                      self._logNode = nodes.querySelector('[data-tun2proxy-logs="1"]');
                      self._buttons = Array.prototype.slice.call(nodes.querySelectorAll('.cbi-button'));
                      var logBtn = nodes.querySelector('[data-tun2proxy-refresh-logs="1"]');

                      if (logBtn) {
                          logBtn.addEventListener('click', function(ev) {
                              ev.preventDefault();
                              self.refreshLogs();
                          });
                      }

                      self.refreshStatus();
                      self.refreshLogs();

                      if (!self._pollRegistered) {
                          poll.add(function() {
                              return self.refreshStatus();
                          }, 8);
                          self._pollRegistered = true;
                      }

                      return nodes;
                  });
              }
          });
          EOF

          chmod 0755 "${PKGROOT}/etc/init.d/tun2proxy"
          dos2unix \
            "${PKGROOT}/etc/config/tun2proxy" \
            "${PKGROOT}/etc/init.d/tun2proxy" \
            "${PKGROOT}/usr/share/luci/menu.d/luci-app-tun2proxy.json" \
            "${PKGROOT}/usr/share/rpcd/acl.d/luci-app-tun2proxy.json" \
            "${PKGROOT}/www/luci-static/resources/view/tun2proxy/config.js"

      - name: Create nFPM config and package
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p packaging

          cat > packaging/postinstall.sh <<'EOF'
          #!/bin/sh
          set -e

          [ -n "${IPKG_INSTROOT}" ] && exit 0

          /etc/init.d/tun2proxy enable >/dev/null 2>&1 || true
          /etc/init.d/rpcd reload >/dev/null 2>&1 || true
          rm -f /tmp/luci-indexcache /tmp/luci-modulecache
          exit 0
          EOF

          cat > packaging/preremove.sh <<'EOF'
          #!/bin/sh
          set -e

          [ -n "${IPKG_INSTROOT}" ] && exit 0

          /etc/init.d/tun2proxy stop >/dev/null 2>&1 || true
          /etc/init.d/tun2proxy disable >/dev/null 2>&1 || true
          rm -f /tmp/luci-indexcache /tmp/luci-modulecache
          exit 0
          EOF

          chmod 0755 packaging/postinstall.sh packaging/preremove.sh

          ARCHS=("aarch64_generic" "aarch64_cortex-a53")
          export PKG_DESC="Highly optimized Rust tun2proxy package for OpenWrt with lightweight LuCI interface, live runtime dashboard, validated route lists and optional local UDP-over-TCP helper."

          export SOURCE_DATE_EPOCH=1704067200
          for ARCH in "${ARCHS[@]}"; do
            cat > nfpm_ipk.yaml <<EOF
          name: ${PKG_NAME}
          arch: ${ARCH}
          platform: linux
          version: ${VERSION}
          section: net
          priority: optional
          maintainer: Arikusey
          description: "${PKG_DESC}"
          homepage: https://github.com/tun2proxy/tun2proxy
          license: MIT

          depends:
            - kmod-tun
            - ip-full
            - procd
            - uci
            - luci-base
            - rpcd
            - rpcd-mod-file

          contents:
            - src: ./tun2proxy-bin
              dst: /usr/bin/tun2proxy
              file_info:
                mode: 0755
                mtime: 2024-01-01T00:00:00Z

            - src: ./udpgw-server
              dst: /usr/bin/udpgw-server
              file_info:
                mode: 0755
                mtime: 2024-01-01T00:00:00Z

            - src: ./pkgroot/etc/init.d/
              dst: /etc/init.d
              type: tree

            - src: ./pkgroot/usr/share/luci/menu.d/
              dst: /usr/share/luci/menu.d
              type: tree

            - src: ./pkgroot/usr/share/rpcd/acl.d/
              dst: /usr/share/rpcd/acl.d
              type: tree

            - src: ./pkgroot/www/luci-static/resources/view/tun2proxy/
              dst: /www/luci-static/resources/view/tun2proxy
              type: tree

            - src: ./pkgroot/etc/config/tun2proxy
              dst: /etc/config/tun2proxy
              type: config|noreplace
              file_info:
                mode: 0644
                mtime: 2024-01-01T00:00:00Z

          scripts:
            postinstall: ./packaging/postinstall.sh
            preremove: ./packaging/preremove.sh
          EOF

            nfpm package --config nfpm_ipk.yaml --packager ipk --target "${PKG_NAME}_${VERSION}_${ARCH}.ipk"
          done

          unset SOURCE_DATE_EPOCH
          for ARCH in "${ARCHS[@]}"; do
            cat > nfpm_apk.yaml <<EOF
          name: ${PKG_NAME}
          arch: ${ARCH}
          platform: linux
          version: ${VERSION}
          section: net
          priority: optional
          maintainer: Arikusey
          description: "${PKG_DESC}"
          homepage: https://github.com/tun2proxy/tun2proxy
          license: MIT

          depends:
            - kmod-tun
            - ip-full
            - procd
            - uci
            - luci-base
            - rpcd
            - rpcd-mod-file

          contents:
            - src: ./tun2proxy-bin
              dst: /usr/bin/tun2proxy
              file_info:
                mode: 0755

            - src: ./udpgw-server
              dst: /usr/bin/udpgw-server
              file_info:
                mode: 0755

            - src: ./pkgroot/etc/init.d/
              dst: /etc/init.d
              type: tree

            - src: ./pkgroot/usr/share/luci/menu.d/
              dst: /usr/share/luci/menu.d
              type: tree

            - src: ./pkgroot/usr/share/rpcd/acl.d/
              dst: /usr/share/rpcd/acl.d
              type: tree

            - src: ./pkgroot/www/luci-static/resources/view/tun2proxy/
              dst: /www/luci-static/resources/view/tun2proxy
              type: tree

            - src: ./pkgroot/etc/config/tun2proxy
              dst: /etc/config/tun2proxy
              type: config|noreplace
              file_info:
                mode: 0644

          scripts:
            postinstall: ./packaging/postinstall.sh
            preremove: ./packaging/preremove.sh
          EOF

            nfpm package --config nfpm_apk.yaml --packager apk --target "${PKG_NAME}_${VERSION}_${ARCH}.apk"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tun2proxy-packages-${{ env.VERSION }}
          path: |
            *.ipk
            *.apk
            tun2proxy-bin
            udpgw-server

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Tun2Proxy ${{ env.VERSION }}
          files: |
            *.ipk
            *.apk
            tun2proxy-bin
            udpgw-server
          draft: false
          prerelease: false
