# ==============================================================================
# Build Script Version: 3.0 (Final) + Max Size Optimization
# Date of Creation: March 3, 2026
# Description: Automated build and packaging (IPK/APK) for Telemt MTProxy.
# Features: 
#   - Rust cross-compilation (aarch64-unknown-linux-musl)
#   - Aggressive Cargo Profile optimizations (z, LTO, abort, etc.)
#   - UPX binary compression (LZMA)
#   - Appended version string (MTProxy vX.X.X) for luci-app-telemt parsing
#   - IPK Build: 2 files (generic/cortex-a53) WITH mtime fix (0x78)
#   - APK Build: 2 files (generic/cortex-a53) WITHOUT mtime fix
#   - ZERO Dependencies: Relies on luci-app-telemt or firmware for certificates
#   - Fixed post-install banner variable interpolation
# ==============================================================================

name: Build and Release Telemt (aarch64-musl)

on:
  push:
    tags:
      - '3.0.1[3-9]'
      - '3.0.[2-9]*'
      - '3.[1-9]*'
      - '[4-9]*'
  
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Enter tag (e.g., 3.0.15) or branch (main)'
        required: true
        default: '3.1.4'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Extract version
        id: vars
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "VERSION=${{ github.event.inputs.build_target }}" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            echo "VERSION=nightly" >> $GITHUB_ENV
          fi

      - name: Checkout upstream repository
        uses: actions/checkout@v4
        with:
          repository: 'telemt/telemt'
          ref: ${{ env.VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install cross and nFPM
        run: |
          curl -sL https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-musl.tar.gz | tar -xz
          sudo mv cross /usr/local/bin/
          
          NFPM_TAG=$(curl -sL https://api.github.com/repos/goreleaser/nfpm/releases/latest | jq -r .tag_name)
          NFPM_VER=${NFPM_TAG#v}
          curl -sL "https://github.com/goreleaser/nfpm/releases/download/${NFPM_TAG}/nfpm_${NFPM_VER}_Linux_x86_64.tar.gz" | tar -xz
          sudo mv nfpm /usr/local/bin/

      - name: Build binary with cross
        run: |
          # 1. Оптимизация по размеру (вместо скорости)
          export CARGO_PROFILE_RELEASE_OPT_LEVEL=z
          
          # 2. Link Time Optimization (Fat LTO) - удаляет мертвый код между всеми зависимостями
          export CARGO_PROFILE_RELEASE_LTO=true
          
          # 3. Один юнит кодогенерации - собирает медленнее, но ужимает лучше
          export CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1
          
          # 4. Отключение механизма разматывания стека при паниках (экономит ~5-10%)
          export CARGO_PROFILE_RELEASE_PANIC=abort
          
          # 5. Ваш strip (уже был)
          export CARGO_PROFILE_RELEASE_STRIP=true
          
          cross build --release --target aarch64-unknown-linux-musl

      - name: Install UPX
        run: sudo apt-get update && sudo apt-get install -y upx-ucl

      - name: Compress with UPX
        run: |
          upx --best --lzma target/aarch64-unknown-linux-musl/release/telemt

      - name: Append version string
        run: |
          echo -n "MTProxy v${{ env.VERSION }}" >> target/aarch64-unknown-linux-musl/release/telemt
          mv target/aarch64-unknown-linux-musl/release/telemt telemt-aarch64-musl

      - name: Build IPK and APK packages with nFPM
        run: |
          export PKG_VER="${{ env.VERSION }}"
          ARCHS=("aarch64_generic" "aarch64_cortex-a53")
          
          # Create post-install script once (removed backslash before PKG_VER)
          cat > postinst.sh <<EOF
          #!/bin/sh
          echo ""
          echo "================================================================="
          echo " Installed telemt static executable version ${PKG_VER}"
          echo " "
          echo " To configure it, you need the following package:"
          echo " https://github.com/Medvedolog/luci-app-telemt"
          echo "================================================================="
          echo ""
          exit 0
          EOF
          chmod 755 postinst.sh

          # ------------------------------------------------------------------
          # 1. Build IPKs - WITH mtime fix (Saves older opkg from 0x78 errors)
          # ------------------------------------------------------------------
          export SOURCE_DATE_EPOCH=1704067200
          for ARCH in "${ARCHS[@]}"; do
            export PKG_ARCH=$ARCH
            echo "Building IPK for $PKG_ARCH..."
            cat > nfpm_ipk.yaml <<EOF
          name: telemt
          arch: $PKG_ARCH
          platform: linux
          version: $PKG_VER
          maintainer: Community
          description: Telemt MTProxy static binary (Built for $PKG_ARCH)
          contents:
            - src: ./telemt-aarch64-musl
              dst: /usr/bin/telemt
              file_info:
                mode: 0755
                mtime: 2024-01-01T00:00:00Z
          scripts:
            postinstall: ./postinst.sh
          EOF
            nfpm pkg --config nfpm_ipk.yaml --packager ipk --target "telemt_${PKG_VER}_${PKG_ARCH}.ipk"
          done

          # ------------------------------------------------------------------
          # 2. Build APKs - WITHOUT mtime fix (Native OpenWrt 25 apk format)
          # ------------------------------------------------------------------
          unset SOURCE_DATE_EPOCH
          for ARCH in "${ARCHS[@]}"; do
            export PKG_ARCH=$ARCH
            echo "Building APK for $PKG_ARCH..."
            cat > nfpm_apk.yaml <<EOF
          name: telemt
          arch: $PKG_ARCH
          platform: linux
          version: $PKG_VER
          maintainer: Community
          description: Telemt MTProxy static binary (Built for $PKG_ARCH)
          contents:
            - src: ./telemt-aarch64-musl
              dst: /usr/bin/telemt
              file_info:
                mode: 0755
          scripts:
            postinstall: ./postinst.sh
          EOF
            nfpm pkg --config nfpm_apk.yaml --packager apk --target "telemt_${PKG_VER}_${PKG_ARCH}.apk"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          files: |
            telemt-aarch64-musl
            *.ipk
            *.apk
          name: Release ${{ env.VERSION }}
          tag_name: ${{ env.VERSION }}
          prerelease: ${{ env.VERSION == 'main' || env.VERSION == 'master' }}
          draft: false
