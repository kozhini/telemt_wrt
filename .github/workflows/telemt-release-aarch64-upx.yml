# ==============================================================================
# Build Script Version: 3.3.10 LTS (Headless + Init Scripts)
# Description: Automated build and packaging (IPK/APK) for Headless Telemt.
# Features: 
#   - Rust cross-compilation (aarch64-unknown-linux-musl)
#   - Aggressive Cargo Profile optimizations (z, LTO, abort, strip)
#   - UPX binary compression (LZMA)
#   - nFPM bundling: binary + /etc/init.d/telemt + /etc/config/telemt
#   - IPK Build WITH mtime fix (0x78 avoidance for older opkg)
#   - APK Build native OpenWrt 25+
# ==============================================================================

name: Build and Release Headless Telemt (aarch64-musl)

on:
  push:
    tags:
      - '3.3.*'
      - '[4-9]*'
  
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Enter tag (e.g., 3.3.10) or branch (main)'
        required: true
        default: '3.3.10'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Extract version
        id: vars
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "VERSION=${{ github.event.inputs.build_target }}" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            echo "VERSION=nightly" >> $GITHUB_ENV
          fi

      # 1. Скачиваем текущий репозиторий (где лежат files/telemt.init и files/telemt.config)
      - name: Checkout local repository
        uses: actions/checkout@v4

      # 2. Скачиваем исходники Rust-бинарника в подпапку upstream_src
      - name: Checkout upstream repository (Telemt source)
        uses: actions/checkout@v4
        with:
          repository: 'telemt/telemt'
          ref: ${{ env.VERSION }}
          path: 'upstream_src'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install cross and nFPM
        run: |
          curl -sL https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-musl.tar.gz | tar -xz
          sudo mv cross /usr/local/bin/
          
          NFPM_TAG=$(curl -sL https://api.github.com/repos/goreleaser/nfpm/releases/latest | jq -r .tag_name)
          NFPM_VER=${NFPM_TAG#v}
          curl -sL "https://github.com/goreleaser/nfpm/releases/download/${NFPM_TAG}/nfpm_${NFPM_VER}_Linux_x86_64.tar.gz" | tar -xz
          sudo mv nfpm /usr/local/bin/

      - name: Build binary with cross
        run: |
          # Переходим в папку с исходниками Rust
          cd upstream_src
          
          export CARGO_PROFILE_RELEASE_OPT_LEVEL=z
          export CARGO_PROFILE_RELEASE_LTO=true
          export CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1
          export CARGO_PROFILE_RELEASE_PANIC=abort
          export CARGO_PROFILE_RELEASE_STRIP=true
          
          cross build --release --target aarch64-unknown-linux-musl

      - name: Install UPX
        run: sudo apt-get update && sudo apt-get install -y upx-ucl

      - name: Compress with UPX
        run: |
          upx --best --lzma upstream_src/target/aarch64-unknown-linux-musl/release/telemt

      - name: Append version string & Move binary
        run: |
          echo -n "MTProxy v${{ env.VERSION }}" >> upstream_src/target/aarch64-unknown-linux-musl/release/telemt
          # Перемещаем готовый бинарник в корень для упаковки
          mv upstream_src/target/aarch64-unknown-linux-musl/release/telemt telemt-aarch64-musl

      - name: Build IPK and APK packages with nFPM
        run: |
          export PKG_VER="${{ env.VERSION }}"
          ARCHS=("aarch64_generic" "aarch64_cortex-a53")
          
          # Скрипт post-install (сразу включаем службу в автозагрузку)
          cat > postinst.sh <<EOF
          #!/bin/sh
          echo ""
          echo "================================================================="
          echo " Installed Headless Telemt version \${PKG_VER}"
          echo " Daemon configuration: /etc/config/telemt"
          echo " To manage via WebUI, install: luci-app-telemt"
          echo "================================================================="
          /etc/init.d/telemt enable
          exit 0
          EOF
          chmod 755 postinst.sh

          # ------------------------------------------------------------------
          # 1. Build IPKs
          # ------------------------------------------------------------------
          export SOURCE_DATE_EPOCH=1704067200
          for ARCH in "${ARCHS[@]}"; do
            export PKG_ARCH=$ARCH
            echo "Building IPK for $PKG_ARCH..."
            cat > nfpm_ipk.yaml <<EOF
          name: telemt
          arch: $PKG_ARCH
          platform: linux
          version: $PKG_VER
          maintainer: Telemt Team
          description: Headless Telemt MTProxy (Core + Init Scripts)
          contents:
            - src: ./telemt-aarch64-musl
              dst: /usr/bin/telemt
              file_info:
                mode: 0755
                mtime: 2024-01-01T00:00:00Z
            - src: ./files/telemt.init
              dst: /etc/init.d/telemt
              file_info:
                mode: 0755
                mtime: 2024-01-01T00:00:00Z
            - src: ./files/telemt.config
              dst: /etc/config/telemt
              type: config
              file_info:
                mode: 0644
                mtime: 2024-01-01T00:00:00Z
          scripts:
            postinstall: ./postinst.sh
          EOF
            nfpm pkg --config nfpm_ipk.yaml --packager ipk --target "telemt_${PKG_VER}_${PKG_ARCH}.ipk"
          done

          # ------------------------------------------------------------------
          # 2. Build APKs
          # ------------------------------------------------------------------
          unset SOURCE_DATE_EPOCH
          for ARCH in "${ARCHS[@]}"; do
            export PKG_ARCH=$ARCH
            echo "Building APK for $PKG_ARCH..."
            cat > nfpm_apk.yaml <<EOF
          name: telemt
          arch: $PKG_ARCH
          platform: linux
          version: $PKG_VER
          maintainer: Telemt Team
          description: Headless Telemt MTProxy (Core + Init Scripts)
          contents:
            - src: ./telemt-aarch64-musl
              dst: /usr/bin/telemt
              file_info:
                mode: 0755
            - src: ./files/telemt.init
              dst: /etc/init.d/telemt
              file_info:
                mode: 0755
            - src: ./files/telemt.config
              dst: /etc/config/telemt
              type: config
              file_info:
                mode: 0644
          scripts:
            postinstall: ./postinst.sh
          EOF
            nfpm pkg --config nfpm_apk.yaml --packager apk --target "telemt_${PKG_VER}_${PKG_ARCH}.apk"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          files: |
            telemt-aarch64-musl
            *.ipk
            *.apk
          name: Release ${{ env.VERSION }}
          tag_name: ${{ env.VERSION }}
          prerelease: false
          draft: false
