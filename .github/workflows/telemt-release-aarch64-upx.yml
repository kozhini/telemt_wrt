name: Build and Release Headless Telemt (aarch64_cortex-a53)

on:
  push:
    tags:
      - '3.3.*'
      - '[4-9]*'
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Enter tag (e.g. 3.3.35) or branch (main)'
        required: true
        default: '3.3.35'
  workflow_call:
    inputs:
      build_target:
        description: 'Tag to build (called from check-upstream workflow)'
        required: true
        type: string

jobs:
  release:
    name: Build and Package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      UPSTREAM_REPO: telemt/telemt
      PKG_NAME: telemt
      PKG_DESC: Advanced MTProto telemt proxy with FakeTLS in a tiny, highly-optimized variant for OpenWrt. (Headless Core Daemon + Init Scripts)

      AARCH64_TARGET: aarch64-unknown-linux-musl
      AARCH64_OUT_BIN: telemt-aarch64-musl

      PKG_ARCH: aarch64_cortex-a53

    steps:
      - name: Extract version
        id: vars
        shell: bash
        run: |
          set -euxo pipefail

          if [[ -n "${{ inputs.build_target }}" ]]; then
            VERSION="${{ inputs.build_target }}"
          elif [[ -n "${{ github.event.inputs.build_target }}" ]]; then
            VERSION="${{ github.event.inputs.build_target }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="nightly"
          fi

          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TAG=${VERSION}" >> "$GITHUB_ENV"

      - name: Checkout local repository
        uses: actions/checkout@v4

      - name: Checkout upstream repository (Telemt source)
        uses: actions/checkout@v4
        with:
          repository: telemt/telemt
          ref: ${{ env.VERSION }}
          path: upstream_src

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install build and packaging tools
        shell: bash
        run: |
          set -euxo pipefail

          sudo apt-get update
          sudo apt-get install -y jq curl tar xz-utils dos2unix upx-ucl file

          CROSS_TAG="$(curl -fsSL https://api.github.com/repos/cross-rs/cross/releases/latest | jq -r .tag_name)"
          curl -fsSL "https://github.com/cross-rs/cross/releases/download/${CROSS_TAG}/cross-x86_64-unknown-linux-musl.tar.gz" | tar -xz
          sudo install -m 0755 cross /usr/local/bin/cross

          NFPM_TAG="$(curl -fsSL https://api.github.com/repos/goreleaser/nfpm/releases/latest | jq -r .tag_name)"
          NFPM_VER="${NFPM_TAG#v}"
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/${NFPM_TAG}/nfpm_${NFPM_VER}_Linux_x86_64.tar.gz" | tar -xz
          sudo install -m 0755 nfpm /usr/local/bin/nfpm

          gh --version || true

      - name: Build aarch64 binary with cross
        shell: bash
        run: |
          set -euxo pipefail

          cd upstream_src
          export CARGO_PROFILE_RELEASE_OPT_LEVEL=z
          export CARGO_PROFILE_RELEASE_LTO=true
          export CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1
          export CARGO_PROFILE_RELEASE_PANIC=abort
          export CARGO_PROFILE_RELEASE_STRIP=true

          cross build --release --target "${AARCH64_TARGET}"

      - name: Compress aarch64 binary with UPX
        shell: bash
        run: |
          set -euxo pipefail

          upx --best --lzma "upstream_src/target/${AARCH64_TARGET}/release/telemt"

      - name: Prepare aarch64 binary
        shell: bash
        run: |
          set -euxo pipefail

          cp "upstream_src/target/${AARCH64_TARGET}/release/telemt" "${AARCH64_OUT_BIN}"
          printf "\nMTProxy v%s\n" "${VERSION}" >> "${AARCH64_OUT_BIN}"
          chmod 0755 "${AARCH64_OUT_BIN}"
          file "${AARCH64_OUT_BIN}" || true

      - name: Fix CRLF line endings in scripts
        shell: bash
        run: |
          set -euxo pipefail

          dos2unix files/telemt.init files/telemt.config

      - name: Generate maintainer scripts
        shell: bash
        run: |
          set -euxo pipefail

          cat > postinst.sh <<EOF
          #!/bin/sh
          echo ""
          echo "================================================================="
          echo " Installed Headless Telemt version ${VERSION}"
          echo " Managed by procd via /etc/init.d/telemt"
          echo " LuCI package (optional): luci-app-telemt"
          echo "================================================================="

          if pidof telemt >/dev/null 2>&1; then
              killall -9 telemt 2>/dev/null || true
          fi

          if [ -d "/etc/telemt" ]; then
              mv /etc/telemt /etc/telemt.disabled_by_luci 2>/dev/null || true
          fi

          old_metrics=\$(uci -q get telemt.general.metrics_port)
          if [ "\$old_metrics" = "9091" ] || [ "\$old_metrics" = "9090" ]; then
              uci set telemt.general.metrics_port='9092'
              uci set telemt.general.api_port='9091'
              uci commit telemt 2>/dev/null || true
          fi

          chmod 0755 /usr/bin/telemt 2>/dev/null || true
          chmod 0755 /etc/init.d/telemt 2>/dev/null || true
          chmod 0644 /etc/config/telemt 2>/dev/null || true

          /etc/init.d/telemt enable 2>/dev/null || true
          /etc/init.d/telemt restart 2>/dev/null || /etc/init.d/telemt start 2>/dev/null || true
          exit 0
          EOF

          cat > prerm.sh <<'EOF'
          #!/bin/sh
          echo ""
          echo "================================================================="
          echo " Removing Headless Telemt package"
          echo "================================================================="
          /etc/init.d/telemt disable 2>/dev/null || true
          /etc/init.d/telemt stop 2>/dev/null || true
          exit 0
          EOF

          cat > postrm.sh <<'EOF'
          #!/bin/sh
          echo ""
          echo "================================================================="
          echo " Headless Telemt removed"
          echo " Cleaning generated runtime files"
          echo "================================================================="
          rm -f /var/etc/telemt.toml
          rm -f /var/etc/telemt.version
          rm -f /tmp/etc/telemt.toml
          rm -f /tmp/telemt_stats.txt
          exit 0
          EOF

          chmod 0755 postinst.sh prerm.sh postrm.sh

      - name: Build IPK packages
        shell: bash
        run: |
          set -euxo pipefail

          export SOURCE_DATE_EPOCH=1704067200

          cat > nfpm_ipk.yaml <<EOF
          name: ${PKG_NAME}
          arch: ${PKG_ARCH}
          platform: linux
          version: ${VERSION}
          section: net
          priority: optional
          maintainer: Telemt Team
          description: "${PKG_DESC}"
          contents:
            - src: ./${AARCH64_OUT_BIN}
              dst: /usr/bin/telemt
              file_info:
                mode: 0755
                mtime: 2024-01-01T00:00:00Z
            - src: ./files/telemt.init
              dst: /etc/init.d/telemt
              file_info:
                mode: 0755
                mtime: 2024-01-01T00:00:00Z
            - src: ./files/telemt.config
              dst: /etc/config/telemt
              type: config
              file_info:
                mode: 0644
                mtime: 2024-01-01T00:00:00Z
          scripts:
            postinstall: ./postinst.sh
            preremove: ./prerm.sh
            postremove: ./postrm.sh
          EOF

          nfpm package \
            --config nfpm_ipk.yaml \
            --packager ipk \
            --target "${PKG_NAME}_${VERSION}_${PKG_ARCH}.ipk"

          test -f "${PKG_NAME}_${VERSION}_${PKG_ARCH}.ipk"

      - name: Build APK packages
        shell: bash
        run: |
          set -euxo pipefail

          cat > nfpm_apk.yaml <<EOF
          name: ${PKG_NAME}
          arch: ${PKG_ARCH}
          platform: linux
          version: ${VERSION}
          maintainer: Telemt Team
          description: "${PKG_DESC}"
          contents:
            - src: ./${AARCH64_OUT_BIN}
              dst: /usr/bin/telemt
              file_info:
                mode: 0755
            - src: ./files/telemt.init
              dst: /etc/init.d/telemt
              file_info:
                mode: 0755
            - src: ./files/telemt.config
              dst: /etc/config/telemt
              type: config
              file_info:
                mode: 0644
          scripts:
            postinstall: ./postinst.sh
            preremove: ./prerm.sh
            postremove: ./postrm.sh
          EOF

          nfpm package \
            --config nfpm_apk.yaml \
            --packager apk \
            --target "${PKG_NAME}_${VERSION}_${PKG_ARCH}.apk"

          test -f "${PKG_NAME}_${VERSION}_${PKG_ARCH}.apk"

      - name: Show built files
        shell: bash
        run: |
          set -euxo pipefail
          echo "IPK:"
          ls -la *.ipk
          echo
          echo "APK:"
          ls -la *.apk
          echo
          echo "BIN:"
          ls -la "${AARCH64_OUT_BIN}"

      - name: Fetch upstream release notes
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p .release

          if gh release view "${TAG}" -R "${UPSTREAM_REPO}" --json body,name >/tmp/upstream_release.json 2>/dev/null; then
            jq -r '.body // ""' /tmp/upstream_release.json > .release/body.txt
            jq -r '.name // ""' /tmp/upstream_release.json > .release/upstream_name.txt
          else
            printf '' > .release/body.txt
            printf '' > .release/upstream_name.txt
          fi

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euxo pipefail

          TITLE="Release ${TAG}"

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" \
              --title "${TITLE}" \
              --notes-file .release/body.txt

            gh release upload "${TAG}" \
              "${AARCH64_OUT_BIN}" \
              *.ipk \
              *.apk \
              --clobber
          else
            gh release create "${TAG}" \
              "${AARCH64_OUT_BIN}" \
              *.ipk \
              *.apk \
              --title "${TITLE}" \
              --notes-file .release/body.txt
          fi
