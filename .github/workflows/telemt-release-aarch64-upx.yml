name: Build and Release Headless Telemt (aarch64-musl)

on:
  push:
    tags:
      - '3.3.*'
      - '[4-9]*'

  workflow_dispatch:
    inputs:
      build_target:
        description: 'Enter tag (e.g., 3.3.15) or branch (main)'
        required: true
        default: '3.3.15'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Extract version
        id: vars
        run: |
          set -euxo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "VERSION=${{ github.event.inputs.build_target }}" >> "$GITHUB_ENV"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
          else
            echo "VERSION=nightly" >> "$GITHUB_ENV"
          fi

      - name: Checkout local repository
        uses: actions/checkout@v4

      - name: Checkout upstream repository (Telemt source)
        uses: actions/checkout@v4
        with:
          repository: telemt/telemt
          ref: ${{ env.VERSION }}
          path: upstream_src

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install cross and nFPM
        run: |
          set -euxo pipefail

          CROSS_TAG=$(curl -sL https://api.github.com/repos/cross-rs/cross/releases/latest | jq -r .tag_name)
          curl -sSfL "https://github.com/cross-rs/cross/releases/download/${CROSS_TAG}/cross-x86_64-unknown-linux-musl.tar.gz" | tar -xz
          sudo mv cross /usr/local/bin/

          NFPM_TAG=$(curl -sL https://api.github.com/repos/goreleaser/nfpm/releases/latest | jq -r .tag_name)
          NFPM_VER=${NFPM_TAG#v}
          curl -sSfL "https://github.com/goreleaser/nfpm/releases/download/${NFPM_TAG}/nfpm_${NFPM_VER}_Linux_x86_64.tar.gz" | tar -xz
          sudo mv nfpm /usr/local/bin/

      - name: Build binary with cross
        run: |
          set -euxo pipefail
          cd upstream_src
          export CARGO_PROFILE_RELEASE_OPT_LEVEL=z
          export CARGO_PROFILE_RELEASE_LTO=true
          export CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1
          export CARGO_PROFILE_RELEASE_PANIC=abort
          export CARGO_PROFILE_RELEASE_STRIP=true
          cross build --release --target aarch64-unknown-linux-musl

      - name: Install UPX and dos2unix
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y upx-ucl dos2unix

      - name: Compress with UPX
        run: |
          set -euxo pipefail
          upx --best --lzma upstream_src/target/aarch64-unknown-linux-musl/release/telemt

      - name: Append version string and move binary
        run: |
          set -euxo pipefail
          printf "\nMTProxy v%s\n" "${{ env.VERSION }}" >> upstream_src/target/aarch64-unknown-linux-musl/release/telemt
          mv upstream_src/target/aarch64-unknown-linux-musl/release/telemt telemt-aarch64-musl

      - name: Fix CRLF line endings in scripts
        run: |
          set -euxo pipefail
          dos2unix files/telemt.init files/telemt.config

      - name: Build IPK and APK packages with nFPM
        run: |
          set -euxo pipefail

          export PKG_VER="${{ env.VERSION }}"
          ARCHS=("aarch64_generic" "aarch64_cortex-a53")

          cat > postinst.sh <<EOF
          #!/bin/sh
          echo ""
          echo "================================================================="
          echo " Installed Headless Telemt version ${PKG_VER}"
          echo " To manage via LuCI WebUI, install: "
          echo " https://github.com/Medvedolog/luci-app-telemt"
          echo "================================================================="
          if pidof telemt >/dev/null 2>&1; then killall -9 telemt 2>/dev/null || true; fi
          if [ -d "/etc/telemt" ]; then mv /etc/telemt /etc/telemt.disabled_by_luci 2>/dev/null || true; fi
          old_metrics=\$(uci -q get telemt.general.metrics_port)
          if [ "\$old_metrics" = "9091" ] || [ "\$old_metrics" = "9090" ]; then
              uci set telemt.general.metrics_port='9092'
              uci set telemt.general.api_port='9091'
              uci commit telemt 2>/dev/null || true
          fi
          /etc/init.d/telemt enable 2>/dev/null || true
          exit 0
          EOF

          cat > prerm.sh <<EOF
          #!/bin/sh
          /etc/init.d/telemt disable 2>/dev/null || true
          /etc/init.d/telemt stop 2>/dev/null || true
          exit 0
          EOF

          cat > postrm.sh <<EOF
          #!/bin/sh
          rm -f /var/etc/telemt.toml
          rm -f /var/etc/telemt.version
          rm -f /tmp/telemt_stats.txt
          exit 0
          EOF

          chmod 755 postinst.sh prerm.sh postrm.sh

          export PKG_DESC="Advanced MTProto telemt proxy with FakeTLS in a tiny, highly-optimized variant for OpenWrt. (Headless Core Daemon + Init Scripts)"

          export SOURCE_DATE_EPOCH=1704067200
          for ARCH in "${ARCHS[@]}"; do
            export PKG_ARCH="$ARCH"
            cat > nfpm_ipk.yaml <<EOF
          name: telemt
          arch: ${PKG_ARCH}
          platform: linux
          version: ${PKG_VER}
          maintainer: Telemt Team
          description: "${PKG_DESC}"
          contents:
            - src: ./telemt-aarch64-musl
              dst: /usr/bin/telemt
              file_info:
                mode: 0755
                mtime: 2024-01-01T00:00:00Z
            - src: ./files/telemt.init
              dst: /etc/init.d/telemt
              file_info:
                mode: 0755
                mtime: 2024-01-01T00:00:00Z
            - src: ./files/telemt.config
              dst: /etc/config/telemt
              type: config
              file_info:
                mode: 0644
                mtime: 2024-01-01T00:00:00Z
          scripts:
            postinstall: ./postinst.sh
            preremove: ./prerm.sh
            postremove: ./postrm.sh
          EOF
            nfpm pkg --config nfpm_ipk.yaml --packager ipk --target "telemt_${PKG_VER}_${PKG_ARCH}.ipk"
          done

          unset SOURCE_DATE_EPOCH
          for ARCH in "${ARCHS[@]}"; do
            export PKG_ARCH="$ARCH"
            cat > nfpm_apk.yaml <<EOF
          name: telemt
          arch: ${PKG_ARCH}
          platform: linux
          version: ${PKG_VER}
          maintainer: Telemt Team
          description: "${PKG_DESC}"
          contents:
            - src: ./telemt-aarch64-musl
              dst: /usr/bin/telemt
              file_info:
                mode: 0755
            - src: ./files/telemt.init
              dst: /etc/init.d/telemt
              file_info:
                mode: 0755
            - src: ./files/telemt.config
              dst: /etc/config/telemt
              type: config
              file_info:
                mode: 0644
          scripts:
            postinstall: ./postinst.sh
            preremove: ./prerm.sh
            postremove: ./postrm.sh
          EOF
            nfpm pkg --config nfpm_apk.yaml --packager apk --target "telemt_${PKG_VER}_${PKG_ARCH}.apk"
          done

      - name: Fetch upstream release notes
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail

          TAG="${{ env.VERSION }}"
          mkdir -p .release

          if gh release view "$TAG" -R telemt/telemt --json body,name >/tmp/upstream_release.json 2>/dev/null; then
            jq -r '.body // ""' /tmp/upstream_release.json > .release/body.txt
            jq -r '.name // ""' /tmp/upstream_release.json > .release/upstream_name.txt
          else
            printf '' > .release/body.txt
            printf '' > .release/upstream_name.txt
          fi

      - name: Create or update GitHub Release from upstream notes
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail

          TAG="${{ env.VERSION }}"
          TITLE="Release ${TAG}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$TITLE" \
              --notes-file .release/body.txt

            gh release upload "$TAG" \
              telemt-aarch64-musl \
              *.ipk \
              *.apk \
              --clobber
          else
            gh release create "$TAG" \
              telemt-aarch64-musl \
              *.ipk \
              *.apk \
              --title "$TITLE" \
              --notes-file .release/body.txt
          fi
